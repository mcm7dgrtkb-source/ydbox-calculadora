<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YD BOX — Calculadora</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }
    body{
      background:#080808;
      font-family:'Barlow Condensed',sans-serif;
      color:white;
    }
    input{
      width:100%;
      background:#111;
      border:1px solid #333;
      border-radius:8px;
      padding:12px;
      color:white;
      font-size:18px;
      outline:none;
      margin-top:6px;
    }
    input:focus{
      border-color:#f5d800;
    }
    .card{
      background:#0d0d0d;
      border:1px solid #222;
      border-radius:14px;
      padding:18px;
      margin-bottom:16px;
    }
    .boxWrap{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px 0 10px;
      perspective:1000px;
    }
    .box3d{
      position:relative;
      transform-style:preserve-3d;
      animation:float 4s ease-in-out infinite;
    }
    .face{
      position:absolute;
      background:#d4a017;
      border:2px solid #f5d800;
      box-shadow:0 0 20px rgba(245,216,0,0.15);
    }
    .front{
      transform:translateZ(60px);
    }
    .back{
      transform:rotateY(180deg) translateZ(60px);
    }
    .right{
      transform:rotateY(90deg) translateZ(60px);
    }
    .left{
      transform:rotateY(-90deg) translateZ(60px);
    }
    .top{
      background:#e5b91f;
      transform:rotateX(90deg) translateZ(60px);
    }
    @keyframes float{
      0%,100%{
        transform:rotateX(-12deg) rotateY(25deg) translateY(0px);
      }
      50%{
        transform:rotateX(-12deg) rotateY(25deg) translateY(-10px);
      }
    }
    .resultado{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:14px;
    }
    .mini{
      background:#111;
      border:1px solid #222;
      border-radius:10px;
      padding:14px;
      text-align:center;
    }
    .mini span{
      display:block;
      color:#666;
      font-size:12px;
      margin-bottom:6px;
    }
    .mini strong{
      color:#f5d800;
      font-size:22px;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;
const fmt = (n,d=2)=>n.toLocaleString('pt-BR',{
  minimumFractionDigits:d,
  maximumFractionDigits:d
});
const fmtBRL = (n)=> 'R$ ' + fmt(n,2);
function App(){
  const [comp,setComp]=useState(30);
  const [larg,setLarg]=useState(20);
  const [alt,setAlt]=useState(15);
  const [gram,setGram]=useState(380);
  const [precoVenda,setPrecoVenda]=useState(14);
  const [precoCusto,setPrecoCusto]=useState(8);
  const [qtd,setQtd]=useState(100);
  const calc = useMemo(()=>{
    const c=Number(comp)||0;
    const l=Number(larg)||0;
    const a=Number(alt)||0;
    const g=Number(gram)||0;
    const pv=Number(precoVenda)||0;
    const pc=Number(precoCusto)||0;
    const q=Number(qtd)||0;
    const area=((c*l)+(a*c)+(a*l))*0.0001;
    const pesoKg=(area*g)/1000;
    const custoUnit=pesoKg*pc;
    const vendaUnit=pesoKg*pv;
    const lucroUnit=vendaUnit-custoUnit;
    return{
      pesoKg,
      custoUnit,
      vendaUnit,
      lucroUnit,
      vendaTotal:vendaUnit*q,
      lucroTotal:lucroUnit*q
    }
  },[comp,larg,alt,gram,precoVenda,precoCusto,qtd]);
  const boxWidth=Math.max(120,comp*4);
  const boxHeight=Math.max(80,alt*4);
  const boxDepth=Math.max(90,larg*4);
  return(
    <div style={{maxWidth:700,margin:'0 auto',padding:'20px'}}>
      <div style={{
        background:'#000',
        border:'2px solid #f5d800',
        borderRadius:'16px',
        padding:'20px',
        marginBottom:'18px'
      }}>
        <div style={{fontSize:'34px',fontWeight:'900'}}>
          YD <span style={{color:'#f5d800'}}>BOX</span>
        </div>
        <div style={{color:'#666',letterSpacing:'2px'}}>
          CALCULADORA DE PAPELÃO
        </div>
      </div>
      <div className="card">
        <div style={{
          color:'#f5d800',
          fontSize:'14px',
          letterSpacing:'2px',
          marginBottom:'16px',
          fontWeight:'700'
        }}>
          VISUAL DA CAIXA
        </div>
        <div className="boxWrap">
          <div
            className="box3d"
            style={{
              width:boxWidth,
              height:boxHeight
            }}
          >
            <div className="face front" style={{width:boxWidth,height:boxHeight}}></div>
            <div className="face back" style={{width:boxWidth,height:boxHeight}}></div>
            <div className="face right" style={{width:boxDepth,height:boxHeight}}></div>
            <div className="face left" style={{width:boxDepth,height:boxHeight}}></div>
            <div className="face top" style={{width:boxWidth,height:boxDepth}}></div>
          </div>
        </div>
        <div style={{
          textAlign:'center',
          marginTop:'20px',
          color:'#999',
          fontSize:'18px'
        }}>
          {comp} x {larg} x {alt} cm
        </div>
      </div>
      <div className="card">
        <div style={{
          color:'#f5d800',
          marginBottom:'14px',
          fontWeight:'700'
        }}>
          MEDIDAS
        </div>
        <label>Comprimento (cm)</label>
        <input type="number" value={comp} onChange={(e)=>setComp(e.target.value)} />
        <label style={{marginTop:'14px',display:'block'}}>Largura (cm)</label>
        <input type="number" value={larg} onChange={(e)=>setLarg(e.target.value)} />
        <label style={{marginTop:'14px',display:'block'}}>Altura (cm)</label>
        <input type="number" value={alt} onChange={(e)=>setAlt(e.target.value)} />
      </div>
      <div className="card">
        <div style={{
          color:'#f5d800',
          marginBottom:'14px',
          fontWeight:'700'
        }}>
          MATERIAL E VALORES
        </div>
        <label>Gramatura</label>
        <input type="number" value={gram} onChange={(e)=>setGram(e.target.value)} />
        <label style={{marginTop:'14px',display:'block'}}>Preço venda R$/kg</label>
        <input type="number" value={precoVenda} onChange={(e)=>setPrecoVenda(e.target.value)} />
        <label style={{marginTop:'14px',display:'block'}}>Preço custo R$/kg</label>
        <input type="number" value={precoCusto} onChange={(e)=>setPrecoCusto(e.target.value)} />
        <label style={{marginTop:'14px',display:'block'}}>Quantidade</label>
        <input type="number" value={qtd} onChange={(e)=>setQtd(e.target.value)} />
      </div>
      <div className="card">
        <div style={{
          color:'#f5d800',
          marginBottom:'14px',
          fontWeight:'700'
        }}>
          RESULTADOS
        </div>
        <div className="resultado">
          <div className="mini">
            <span>Peso KG</span>
            <strong>{fmt(calc.pesoKg,4)}</strong>
          </div>
          <div className="mini">
            <span>Custo Unit.</span>
            <strong>{fmtBRL(calc.custoUnit)}</strong>
          </div>
          <div className="mini">
            <span>Venda Unit.</span>
            <strong>{fmtBRL(calc.vendaUnit)}</strong>
          </div>
          <div className="mini">
            <span>Lucro Unit.</span>
            <strong>{fmtBRL(calc.lucroUnit)}</strong>
          </div>
          <div className="mini">
            <span>Venda Total</span>
            <strong>{fmtBRL(calc.vendaTotal)}</strong>
          </div>
          <div className="mini">
            <span>Lucro Total</span>
            <strong>{fmtBRL(calc.lucroTotal)}</strong>
          </div>
        </div>
      </div>
    </div>
  )
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
