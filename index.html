
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000"/>

<title>YD BOX — Calculadora Especialista</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  font-family:'Barlow Condensed',sans-serif;
  color:white;
}

input, textarea, select{
  width:100%;
  background:#111;
  border:1px solid #2b2b2b;
  border-radius:10px;
  padding:14px;
  color:white;
  font-size:18px;
  font-family:'Barlow Condensed';
  outline:none;
}

input:focus, textarea:focus, select:focus{
  border-color:#f5d800;
}

select {
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23f5d800' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 16px;
  cursor: pointer;
}

textarea{
  resize: vertical;
  min-height: 90px;
  font-size: 16px;
  color: #ccc;
  line-height: 1.4;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:30px;
  border-bottom:2px solid #f5d800;
  padding-bottom:20px;
}

.logo{
  font-size:42px;
  font-weight:900;
}

.logo span{
  color:#f5d800;
}

.subtitle{
  color:#666;
  font-size:14px;
  letter-spacing:3px;
}

.grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:30px;
}

.card{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
}

.section-title{
  font-size:12px;
  letter-spacing:3px;
  color:#f5d800;
  margin-bottom:16px;
  font-weight:800;
}

.fields{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.fields-material {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.label{
  margin-bottom:6px;
  color:#777;
  font-size:12px;
}

.result{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #1f1f1f;
}

.result:last-child{
  border:none;
}

.result-name{
  color:#777;
}

.result-value{
  font-weight:800;
  color:#f5d800;
}

.total-box{
  background:#000;
  border:2px solid #f5d800;
  border-radius:18px;
  padding:20px;
}

.total-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
  margin-top:20px;
}

.total-item{
  background:#111;
  border-radius:12px;
  padding:18px;
  text-align:center;
}

.total-item h3{
  color:#666;
  font-size:12px;
  margin-bottom:8px;
}

.total-item p{
  font-size:22px;
  font-weight:900;
}

.mockup{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:18px;
  min-height:720px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:30px 20px 20px 20px;
  position:relative;
  overflow:hidden;
}

.action-controls {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.action-btn {
  background: #111;
  border: 1px solid #333;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Barlow Condensed';
  font-size: 15px;
  font-weight: 700;
  transition: all 0.2s;
}

.action-btn:hover {
  border-color: #f5d800;
  color: #f5d800;
}

.pdf-btn {
  background: #f5d800;
  color: #000;
  border: 1px solid #f5d800;
}
.pdf-btn:hover {
  background: #000;
  color: #f5d800;
}

.mockup-watermark-bg {
  position: absolute;
  top: 46%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  height: 320px;
  opacity: 0.05;
  pointer-events: none;
  z-index: 1;
}

.box-svg-container {
  width: 100%;
  display: flex;
  flex: 1;
  align-items: center;
  justify-content: center;
  z-index: 2;
  padding-top: 50px; 
  padding-bottom: 10px;
}

.box-description-panel {
  width: 100%;
  background: #111;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 16px;
  margin-top: 15px;
  z-index: 5;
}

.box-description-panel h4 {
  color: #f5d800;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 8px;
  font-weight: 800;
}

#pdf-template {
  display: none;
}

svg.main-box-svg {
  width: 100%;
  max-width: 760px;
  margin: auto;
  transition: transform 0.2s ease-out;
}

@media(max-width:900px){
  .grid{ grid-template-columns:1fr; }
  .mockup{ min-height:550px; }
  .mockup-watermark-bg { width: 240px; height: 240px; }
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useMemo,useEffect}=React;

const fmt=(n,d=2)=>
n.toLocaleString('pt-BR',{
minimumFractionDigits:d,
maximumFractionDigits:d
});

const money=(n)=>"R$ "+fmt(n);

const tabelaMateriais = {
  duplex: [
    { label: "290g (3.8 Coluna)", gramatura: 290, custo: 8.79, venda: 17.58 },
    { label: "355g (4.2 Coluna)", gramatura: 355, custo: 7.10, venda: 14.20 }
  ],
  triplex: [
    { label: "470g (6.5 Coluna)", gramatura: 470, custo: 8.79, venda: 17.58 },
    { label: "610g (7.0 Coluna)", gramatura: 610, custo: 7.10, venda: 14.20 }
  ]
};

function App(){

const [comp,setComp]=useState(300);
const [larg,setLarg]=useState(200);
const [alt,setAlt]=useState(150);
const [qtd,setQtd]=useState(100);
const [zoom, setZoom] = useState(1.0);

const [onda, setOnda] = useState("duplex");
const [materialSelecionado, setMaterialSelecionado] = useState(tabelaMateriais.duplex[0]);

const [manualDesc, setManualDesc] = useState(
  "Caixa de Papelão Ondulado Estruturada no Formato Maleta Normal RSC. Ideal para empacotamento, envios logísticos estáveis e armazenamento seguro."
);

useEffect(() => {
  setMaterialSelecionado(tabelaMateriais[onda][0]);
}, [onda]);

const calc=useMemo(()=>{
const c=Number(comp)||0;
const l=Number(larg)||0;
const a=Number(alt)||0;
const q=Number(qtd)||0;

const g=materialSelecionado.gramatura;
const pc=materialSelecionado.custo;
const pv=materialSelecionado.venda;

const cVar=c+4;
const lVar=l+4;

const devHoriz=(2*cVar)+(2*lVar)+30; 
const abaTop=lVar/2;
const abaBot=cVar/2;
const devVert=a+abaTop+abaBot;

const areaMm2=devHoriz*devVert;
const areaM2=areaMm2/1000000;

const pesoGramas=areaM2*g;
const pesoKg=pesoGramas/1000;
const pesoTotalKg=pesoKg*q;

const custoUnit=pesoKg*pc;
const vendaUnit=pesoKg*pv;
const lucroUnit=vendaUnit-custoUnit;

return{
areaMm2,
pesoGramas,
pesoTotalKg,
custoTotal:custoUnit*q,
vendaTotal:vendaUnit*q,
lucroTotal:lucroUnit*q,
margem:vendaUnit > 0 ? (lucroUnit/vendaUnit)*100 : 0
};
},[comp,larg,alt,qtd,materialSelecionado]);

const handleZoomIn = () => setZoom(prev => Math.min(prev + 0.15, 2.0));
const handleZoomOut = () => setZoom(prev => Math.max(prev - 0.15, 0.4));
const handleZoomReset = () => setZoom(1.0);

const exportToPDF = () => {
  const element = document.getElementById('pdf-template');
  element.style.display = 'block';
  
  const opt = {
    margin:       8,
    filename:     `Orcamento_YD_BOX_${comp}x${larg}x${alt}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, backgroundColor: '#080808', useCORS: true },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save().then(() => {
    element.style.display = 'none';
  });
};

const LogoOriginalSVG = () => (
  <svg viewBox="0 0 200 200" style={{width: '100%', height: '100%'}}>
    <path d="M 20,20 L 180,20 L 180,150 M 120,180 L 20,180 Z" fill="none" stroke="white" strokeWidth="4" strokeLinecap="square"/>
    <g transform="translate(10, 5)">
      <path d="M 40,55 L 60,90 L 60,125 L 85,125 L 85,90 L 105,55 L 75,55 L 72.5,75 L 70,55 Z" fill="white" />
      <path d="M 97,55 H 145 C 172,55 180,75 180,90 C 180,110 172,125 145,125 H 97 Z" fill="white" />
      <path d="M 117,70 H 140 C 158,70 160,82 160,90 C 160,100 158,110 140,110 H 117 Z" fill="#000" />
      <g transform="translate(130, 82) scale(0.42)">
        <polygon points="30,0 60,15 30,30 0,15" fill="#f5d800" stroke="#000" strokeWidth="4"/>
        <polygon points="0,15 30,30 30,62 0,47" fill="white" stroke="#000" strokeWidth="4"/>
        <polygon points="30,30 60,15 60,47 30,62" fill="white" stroke="#000" strokeWidth="4"/>
      </g>
    </g>
    <text x="135" y="184" fill="white" fontSize="20" fontWeight="700" fontFamily="sans-serif" letterSpacing="7">BOX</text>
  </svg>
);

const DesenhoCaixaSVG = ({ widthMm, heightMm, depthMm }) => {
  const cNum = Math.max(Number(widthMm) || 0, 1);
  const lNum = Math.max(Number(heightMm) || 0, 1);
  const aNum = Math.max(Number(depthMm) || 0, 1);

  const maxDim = Math.max(cNum, lNum, aNum);
  const fatorGlobal = 210 / maxDim;

  const w = cNum * fatorGlobal; 
  const d = lNum * fatorGlobal; 
  const h = aNum * fatorGlobal; 

  const flapSize = d / 2;
  const cx = 450;
  const cy = 350 + (h / 2) - ((w / 4) + (d / 4)) / 2;

  return (
    <g>
      <polygon points={`${cx},${cy} ${cx - w},${cy - w/2} ${cx - w + d},${cy - w/2 - d/2} ${cx + d},${cy - d/2}`} fill="#6a3b08" stroke="#422403" strokeWidth="1.5" />
      <polygon points={`${cx - w},${cy - w/2} ${cx - w + d},${cy - w/2 - d/2} ${cx - w + d},${cy - w/2 - d/2 - h} ${cx - w},${cy - w/2 - h}`} fill="#7d470d" />
      <polygon points={`${cx + d},${cy - d/2} ${cx - w + d},${cy - w/2 - d/2} ${cx - w + d},${cy - w/2 - d/2 - h} ${cx + d},${cy - d/2 - h}`} fill="#8e5313" />
      <polygon points={`${cx},${cy} ${cx - w},${cy - w/2} ${cx - w + d},${cy - w/2 - d/2} ${cx + d},${cy - d/2}`} fill="url(#innerShadow)" style={{mixBlendMode: 'multiply'}} />

      <polygon points={`${cx - w},${cy - w/2 - h} ${cx - w + d},${cy - w/2 - d/2 - h} ${cx - w + d - flapSize},${cy - w/2 - d/2 - h - flapSize/2} ${cx - w - flapSize},${cy - w/2 - h - flapSize/2}`} fill="#a06320" stroke="#73420f" strokeWidth="2" />
      <polygon points={`${cx + d},${cy - d/2 - h} ${cx - w + d},${cy - w/2 - d/2 - h} ${cx - w + d + flapSize},${cy - w/2 - d/2 - h - flapSize/2} ${cx + d + flapSize},${cy - d/2 - h - flapSize/2}`} fill="#ad6d25" stroke="#73420f" strokeWidth="2" />

      <polygon points={`${cx},${cy} ${cx - w},${cy - w/2} ${cx - w},${cy - w/2 - h} ${cx},${cy - h}`} fill="#c8893d" stroke="#8b5c1c" strokeWidth="3" />
      <polygon points={`${cx},${cy} ${cx + d},${cy - d/2} ${cx + d},${cy - d/2 - h} ${cx},${cy - h}`} fill="#b67831" stroke="#8b5c1c" strokeWidth="3" />

      <polygon points={`${cx},${cy - h} ${cx - w},${cy - w/2 - h} ${cx - w - flapSize},${cy - w/2 - h + flapSize/2} ${cx - flapSize},${cy - h + flapSize/2}`} fill="#dca04d" stroke="#8b5c1c" strokeWidth="3" />
      <polygon points={`${cx},${cy - h} ${cx + d},${cy - d/2 - h} ${cx + d + flapSize},${cy - d/2 - h + flapSize/2} ${cx + flapSize},${cy - h + flapSize/2}`} fill="#e4aa57" stroke="#8b5c1c" strokeWidth="3" />

      <text x={cx - w/2} y={cy + 45} fill="#f5d800" fontSize="26" fontWeight="900" textAnchor="middle">{widthMm} mm</text>
      <text x={cx + d/2 + 45} y={cy - d/4 + 40} fill="#f5d800" fontSize="26" fontWeight="900" textAnchor="middle">{heightMm} mm</text>
      <g transform={`translate(${cx - w - 40}, ${cy - w/2 - h/2})`}><text fill="#f5d800" fontSize="26" fontWeight="900" textAnchor="middle" transform="rotate(-90)">{depthMm} mm</text></g>
    </g>
  );
};

return(

<div className="container">

<div className="header">
<div>
<div className="logo">YD <span>BOX</span></div>
<div className="subtitle">CALCULADORA DE PAPELÃO (MM)</div>
</div>
</div>

<div className="grid">

{/* COLUNA ESQUERDA */}
<div>
<div className="card">
<div className="section-title">MEDIDAS (EM MILÍMETROS)</div>
<div className="fields">
<div>
<div className="label">COMPRIMENTO</div>
<input type="number" value={comp} onChange={(e)=>setComp(e.target.value)}/>
</div>
<div>
<div className="label">LARGURA</div>
<input type="number" value={larg} onChange={(e)=>setLarg(e.target.value)}/>
</div>
<div>
<div className="label">ALTURA</div>
<input type="number" value={alt} onChange={(e)=>setAlt(e.target.value)}/>
</div>
</div>
</div>

<div className="card">
<div className="section-title">ESTRUTURA DO MATERIAL</div>
<div className="fields-material">
<div>
<div className="label">TIPO DE ONDA</div>
<select value={onda} onChange={(e)=>setOnda(e.target.value)}>
  <option value="duplex">Duplex (Uma onda)</option>
  <option value="triplex">Triplex (Duas ondas)</option>
</select>
</div>
<div>
<div className="label">ESPECIFICAÇÃO</div>
<select 
  value={materialSelecionado.label} 
  onChange={(e) => {
    const escolhido = tabelaMateriais[onda].find(item => item.label === e.target.value);
    if(escolhido) setMaterialSelecionado(escolhido);
  }}
>
  {tabelaMateriais[onda].map((item, idx) => (
    <option key={idx} value={item.label}>{item.label}</option>
  ))}
</select>
</div>
</div>
</div>

<div className="card">
<div className="section-title">QUANTIDADE</div>
<input type="number" value={qtd} onChange={(e)=>setQtd(e.target.value)}/>
</div>

<div className="card">
<div className="section-title">CÁLCULO</div>
<div className="result"><div className="result-name">Estrutura Aplicada</div><div className="result-value" style={{textTransform:'uppercase'}}>{onda} ({materialSelecionado.gramatura}g)</div></div>
<div className="result"><div className="result-name">Área Total</div><div className="result-value">{fmt(calc.areaMm2, 0)} mm²</div></div>
<div className="result"><div className="result-name">Peso por Caixa</div><div className="result-value">{fmt(calc.pesoGramas)} g</div></div>
<div className="result"><div className="result-name">Peso Total do Pedido</div><div className="result-value" style={{color:'#f5d800'}}>{fmt(calc.pesoTotalKg)} kg</div></div>
<div className="result"><div className="result-name">Margem de Lucro</div><div className="result-value">{fmt(calc.margem)}%</div></div>
</div>

<div className="total-box">
<h2 style={{fontSize:'28px'}}>TOTAL DO PEDIDO</h2>
<div className="total-grid">
<div className="total-item"><h3>CUSTO</h3><p style={{color:'#999'}}>{money(calc.custoTotal)}</p></div>
<div className="total-item"><h3>VENDA</h3><p style={{color:'#f5d800'}}>{money(calc.vendaTotal)}</p></div>
<div className="total-item"><h3>LUCRO</h3><p style={{color:'#4dcc7a'}}>{money(calc.lucroTotal)}</p></div>
</div>
</div>
</div>

{/* COLUNA DIREITA */}
<div>
<div className="mockup">
  
  <div className="action-controls">
    <button className="action-btn" onClick={handleZoomIn}>Zoom +</button>
    <button className="action-btn" onClick={handleZoomOut}>Zoom -</button>
    <button className="action-btn" onClick={handleZoomReset} style={{opacity: 0.5}}>Reset</button>
    <button className="action-btn pdf-btn" onClick={exportToPDF}>Exportar PDF</button>
  </div>

  {/* Logotipo oficial centralizado perfeitamente ao fundo com marca d'água */}
  <div className="mockup-watermark-bg">
    <LogoOriginalSVG />
  </div>

  {/* Caixa renderizada de forma centralizada que se sobrepõe ao logo */}
  <div className="box-svg-container">
  <svg className="main-box-svg" viewBox="0 0 900 700" style={{ transform: `scale(${zoom})` }}>
    <defs>
      <linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stopColor="#000000" stopOpacity="0.65" />
        <stop offset="100%" stopColor="#000000" stopOpacity="0" />
      </linearGradient>
    </defs>
    <DesenhoCaixaSVG widthMm={comp} heightMm={larg} depthMm={alt} />
  </svg>
  </div>

  <div className="box-description-panel">
    <h4>ESPECIFICAÇÕES DO MODELO (TEXTO EDITÁVEL)</h4>
    <textarea 
      value={manualDesc} 
      onChange={(e) => setManualDesc(e.target.value)}
      placeholder="Escreva aqui manualmente a descrição técnica ou observações comerciais da caixa..."
    />
  </div>
</div>
</div>

</div>

{/* TEMPLATE DO PDF INDUSTRIAL COMPACTADO EM 1 PÁGINA A4 */}
<div id="pdf-template" style={{ background: '#080808', color: '#ffffff', fontFamily: 'sans-serif', padding: '15px', width: '190mm', margin: '0 auto' }}>
  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '2px solid #f5d800', paddingBottom: '10px', marginBottom: '15px' }}>
    <div>
      <h1 style={{ fontSize: '28px', fontWeight: '900', color: '#fff', margin: 0, letterSpacing: '1px' }}>YD <span style={{ color: '#f5d800' }}>BOX</span></h1>
      <p style={{ fontSize: '10px', color: '#666', letterSpacing: '2px', marginTop: '2px' }}>RELATÓRIO TÉCNICO DE ORÇAMENTO</p>
    </div>
    <div style={{ width: '55px', height: '55px' }}>
      <LogoOriginalSVG />
    </div>
  </div>

  <div style={{ background: '#0d0d0d', border: '1px solid #222', padding: '12px', borderRadius: '10px', marginBottom: '12px' }}>
    <h3 style={{ color: '#f5d800', fontSize: '12px', marginBottom: '8px', letterSpacing: '1px' }}>DADOS E DIMENSÕES DA EMBALAGEM</h3>
    <table style={{ width: '100%', borderCollapse: 'collapse', color: '#ccc', fontSize: '13px' }}>
      <tbody>
        <tr><td style={{ padding: '4px 0', color: '#777' }}>Dimensões Solicitadas:</td><td style={{ textAlign: 'right', fontWeight: 'bold', color: '#fff' }}>{comp}mm x {larg}mm x {alt}mm</td></tr>
        <tr><td style={{ padding: '4px 0', color: '#777' }}>Estrutura / Onda:</td><td style={{ textAlign: 'right', fontWeight: 'bold', textTransform: 'uppercase', color: '#f5d800' }}>{onda} - {materialSelecionado.label}</td></tr>
        <tr><td style={{ padding: '4px 0', color: '#777' }}>Área de Desenvolvimento:</td><td style={{ textAlign: 'right', fontWeight: 'bold' }}>{fmt(calc.areaMm2, 0)} mm²</td></tr>
        <tr><td style={{ padding: '4px 0', color: '#777' }}>Peso Unitário da Caixa:</td><td style={{ textAlign: 'right', fontWeight: 'bold' }}>{fmt(calc.pesoGramas)} g</td></tr>
        <tr><td style={{ padding: '4px 0', color: '#777' }}>Quantidade Solicitada:</td><td style={{ textAlign: 'right', fontWeight: 'bold', color: '#fff' }}>{qtd} un</td></tr>
        <tr><td style={{ padding: '4px 0', color: '#777' }}>Peso Bruto Total do Lote:</td><td style={{ textAlign: 'right', fontWeight: 'bold' }}>{fmt(calc.pesoTotalKg)} kg</td></tr>
      </tbody>
    </table>
  </div>

  <div style={{ background: '#000', border: '2px solid #f5d800', padding: '12px', borderRadius: '10px', marginBottom: '12px' }}>
    <div style={{ display: 'flex', justifyContent: 'space-around', textAlign: 'center' }}>
      <div><span style={{ fontSize: '10px', color: '#666', display: 'block' }}>CUSTO INDÚSTRIA</span><span style={{ fontSize: '18px', color: '#aaa', fontWeight: 'bold' }}>{money(calc.custoTotal)}</span></div>
      <div><span style={{ fontSize: '10px', color: '#f5d800', display: 'block' }}>VALOR DE VENDA</span><span style={{ fontSize: '18px', color: '#f5d800', fontWeight: 'bold' }}>{money(calc.vendaTotal)}</span></div>
      <div><span style={{ fontSize: '10px', color: '#4dcc7a', display: 'block' }}>LUCRO ESTIMADO</span><span style={{ fontSize: '18px', color: '#4dcc7a', fontWeight: 'bold' }}>{money(calc.lucroTotal)}</span></div>
    </div>
  </div>

  <div style={{ background: '#0d0d0d', border: '1px solid #222', padding: '10px', borderRadius: '10px', marginBottom: '12px' }}>
    <h3 style={{ color: '#f5d800', fontSize: '11px', marginBottom: '4px' }}>DESCRIÇÃO COMERCIAL INFORMADA</h3>
    <p style={{ fontSize: '13px', color: '#ccc', lineHeight: '1.4', margin: 0 }}>{manualDesc}</p>
  </div>

  <h3 style={{ color: '#f5d800', fontSize: '11px', marginBottom: '6px', letterSpacing: '1px' }}>PERSPECTIVA TÉCNICA 3D DA CAIXA</h3>
  <div style={{ background: '#0d0d0d', border: '1px solid #222', borderRadius: '10px', padding: '10px', display: 'flex', justifyContent: 'center' }}>
    <div style={{ width: '68%' }}>
      <svg viewBox="0 0 900 700" style={{ width: '100%', height: 'auto' }}>
        <DesenhoCaixaSVG widthMm={comp} heightMm={larg} depthMm={alt} />
      </svg>
    </div>
  </div>
  
  <p style={{ marginTop: '15px', fontSize: '11px', color: '#444', textAlign: 'center', lineHeight: '1.3' }}>
    Este documento é uma especificação técnica digital emitida pela plataforma YD BOX.<br/>Dimensões baseadas em testes estruturais com tolerância técnica padrão.
  </p>
</div>

</div>

);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
