<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="YD Box"/>
  <link rel="manifest" href="manifest.json"/>

  <title>YD Box — Calculadora</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      background:#080808;
      font-family:'Barlow Condensed',sans-serif;
      overflow-x:hidden;
    }

    input[type=number]::-webkit-inner-spin-button{
      opacity:0.3;
      filter:invert(1);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(14px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .fadeUp{
      animation:fadeUp 0.3s ease both;
    }

    @keyframes flap{
      0%{transform:rotateX(0deg);}
      50%{transform:rotateX(-28deg);}
      100%{transform:rotateX(0deg);}
    }

    .flap{
      animation:flap 3s ease-in-out infinite;
      transform-origin:bottom;
    }

  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useMemo } = React;

const fmt = (n, d=2) =>
  n.toLocaleString("pt-BR",{
    minimumFractionDigits:d,
    maximumFractionDigits:d
  });

const fmtBRL = (n) => "R$ " + fmt(n,2);

function Field({
  label,
  value,
  onChange,
  unit,
  hint,
  step="any",
  min=0
}){

  const [focused,setFocused]=useState(false);

  return(
    <div style={{
      display:"flex",
      flexDirection:"column",
      gap:6
    }}>

      <label style={{
        fontSize:9,
        fontWeight:800,
        letterSpacing:"0.18em",
        textTransform:"uppercase",
        color:focused?"#f5d800":"#666"
      }}>
        {label}
      </label>

      <div style={{
        display:"flex",
        alignItems:"center",
        background:"#111",
        border:`1.5px solid ${focused?"#f5d800":"#333"}`,
        borderRadius:6,
        overflow:"hidden"
      }}>

        <input
          type="number"
          min={min}
          step={step}
          value={value}
          onFocus={()=>setFocused(true)}
          onBlur={()=>setFocused(false)}
          onChange={e=>onChange(
            e.target.value===""
              ? ""
              : Number(e.target.value)
          )}
          style={{
            flex:1,
            border:"none",
            background:"transparent",
            padding:"12px 14px",
            fontSize:18,
            fontFamily:"'Barlow Condensed',sans-serif",
            fontWeight:600,
            color:"#fff",
            outline:"none",
            width:0
          }}
        />

        {unit&&(
          <span style={{
            padding:"0 12px",
            color:focused?"#f5d800":"#555",
            fontSize:11,
            fontWeight:700,
            whiteSpace:"nowrap"
          }}>
            {unit}
          </span>
        )}

      </div>

      {hint&&(
        <span style={{
          fontSize:9,
          color:"#444"
        }}>
          {hint}
        </span>
      )}

    </div>
  );

}

function Section({num,title,children}){

  return(
    <div style={{marginBottom:16}}>

      <div style={{
        display:"flex",
        alignItems:"center",
        gap:10,
        marginBottom:12
      }}>

        <div style={{
          width:24,
          height:24,
          background:"#f5d800",
          borderRadius:4,
          display:"flex",
          alignItems:"center",
          justifyContent:"center",
          fontSize:11,
          fontWeight:900,
          color:"#000"
        }}>
          {num}
        </div>

        <span style={{
          fontSize:11,
          fontWeight:800,
          letterSpacing:"0.14em",
          textTransform:"uppercase",
          color:"#aaa"
        }}>
          {title}
        </span>

        <div style={{
          flex:1,
          height:1,
          background:"#222"
        }}/>

      </div>

      <div style={{
        background:"#0d0d0d",
        borderRadius:10,
        padding:"18px 16px",
        border:"1px solid #222"
      }}>
        {children}
      </div>

    </div>
  );

}

function CalcRow({
  label,
  formula,
  result,
  yellow,
  last
}){

  return(
    <div style={{
      display:"flex",
      justifyContent:"space-between",
      alignItems:"flex-start",
      padding:"10px 0",
      borderBottom:last?"none":"1px solid #1a1a1a",
      gap:12
    }}>

      <div style={{
        flex:1,
        minWidth:0
      }}>

        <div style={{
          fontSize:9,
          color:"#555",
          fontWeight:700,
          letterSpacing:"0.1em",
          textTransform:"uppercase",
          marginBottom:3
        }}>
          {label}
        </div>

        <div style={{
          fontSize:11,
          color:"#444",
          fontWeight:500
        }}>
          {formula}
        </div>

      </div>

      <div style={{
        fontSize:16,
        fontWeight:700,
        color:yellow?"#f5d800":"#fff",
        whiteSpace:"nowrap",
        background:yellow?"#1a1700":"#161616",
        padding:"5px 12px",
        borderRadius:5,
        border:yellow
          ?"1px solid #3a3300"
          :"1px solid #222"
      }}>
        {result}
      </div>

    </div>
  );

}

/* ========================= */
/* CAIXA VISUAL */
/* ========================= */

function BoxPreview({comp,larg,alt}){

  const width = Math.max(120, comp * 3);
  const height = Math.max(70, alt * 3);
  const depth = Math.max(60, larg * 2.2);

  return(

    <div style={{
      background:"#0d0d0d",
      border:"1px solid #222",
      borderRadius:14,
      padding:"24px 10px",
      marginBottom:18,
      overflow:"hidden"
    }}>

      <div style={{
        textAlign:"center",
        fontSize:11,
        letterSpacing:"0.18em",
        color:"#777",
        fontWeight:800,
        marginBottom:16
      }}>
        VISUALIZAÇÃO DA CAIXA
      </div>

      <div style={{
        position:"relative",
        width:"100%",
        height:320,
        display:"flex",
        justifyContent:"center",
        alignItems:"center"
      }}>

        <div style={{
          position:"relative",
          width:width,
          height:height,
          transform:"skewY(-8deg)"
        }}>

          {/* TAMPA */}

          <div className="flap" style={{
            position:"absolute",
            width:width,
            height:40,
            background:"#d6a100",
            top:-38,
            left:0,
            clipPath:"polygon(0 100%, 8% 0, 92% 0, 100% 100%)",
            border:"2px solid #f5d800"
          }}/>

          {/* FRENTE */}

          <div style={{
            position:"absolute",
            width:width,
            height:height,
            background:"#f5d800",
            border:"3px solid #ffe95c",
            borderRadius:6,
            boxShadow:"0 15px 35px rgba(245,216,0,0.15)"
          }}/>

          {/* LATERAL */}

          <div style={{
            position:"absolute",
            width:depth,
            height:height,
            background:"#c99700",
            right:-depth,
            top:-depth/2,
            transform:"skewY(45deg)",
            border:"3px solid #f5d800"
          }}/>

          {/* TOPO */}

          <div style={{
            position:"absolute",
            width:width,
            height:depth,
            background:"#ffd633",
            top:-depth,
            left:depth/2,
            transform:"skewX(45deg)",
            border:"3px solid #f5d800"
          }}/>

          {/* TEXTO */}

          <div style={{
            position:"absolute",
            width:"100%",
            top:"42%",
            textAlign:"center",
            color:"#000",
            fontWeight:900,
            fontSize:28,
            letterSpacing:"0.1em"
          }}>
            YD BOX
          </div>

          {/* MEDIDAS */}

          <div style={{
            position:"absolute",
            bottom:-34,
            width:"100%",
            textAlign:"center",
            color:"#f5d800",
            fontWeight:800,
            fontSize:14
          }}>
            COMPRIMENTO: {comp} cm
          </div>

          <div style={{
            position:"absolute",
            left:-90,
            top:"40%",
            color:"#f5d800",
            fontWeight:800,
            fontSize:14,
            transform:"rotate(-90deg)"
          }}>
            ALTURA: {alt} cm
          </div>

          <div style={{
            position:"absolute",
            right:-140,
            top:-55,
            color:"#f5d800",
            fontWeight:800,
            fontSize:14
          }}>
            LARGURA: {larg} cm
          </div>

        </div>

      </div>

    </div>

  );

}

function App(){

  const [comp,setComp]=useState(30);
  const [larg,setLarg]=useState(20);
  const [alt,setAlt]=useState(15);

  const [gram,setGram]=useState(380);
  const [precoVenda,setPrecoVenda]=useState(14);
  const [precoCusto,setPrecoCusto]=useState(8);
  const [qtd,setQtd]=useState(100);

  const calc=useMemo(()=>{

    const c=Number(comp)||0;
    const l=Number(larg)||0;
    const a=Number(alt)||0;

    const g=Number(gram)||0;
    const pv=Number(precoVenda)||0;
    const pc=Number(precoCusto)||0;
    const q=Number(qtd)||0;

    if(!c||!l||!a||!g||!pv||!pc||!q)return null;

    const cVar=c+0.4;
    const lVar=l+0.4;

    const devHoriz=(2*cVar)+(2*lVar)+3;

    const abaTop=lVar/2;
    const abaBot=cVar/2;

    const devVert=a+abaTop+abaBot;

    const areaCm2=devHoriz*devVert;
    const areaM2=areaCm2/10000;

    const pesoGramas=areaM2*g;
    const pesoKg=pesoGramas/1000;

    const custoUnit=pesoKg*pc;
    const vendaUnit=pesoKg*pv;
    const lucroUnit=vendaUnit-custoUnit;

    const custoTotal=custoUnit*q;
    const vendaTotal=vendaUnit*q;
    const lucroTotal=lucroUnit*q;

    const margemPct=(lucroUnit/vendaUnit)*100;

    return{
      cVar,lVar,
      devHoriz,devVert,
      abaTop,abaBot,
      areaCm2,areaM2,
      pesoGramas,pesoKg,
      custoUnit,vendaUnit,
      lucroUnit,
      custoTotal,
      vendaTotal,
      lucroTotal,
      margemPct
    };

  },[
    comp,
    larg,
    alt,
    gram,
    precoVenda,
    precoCusto,
    qtd
  ]);

  return(

    <div style={{
      minHeight:"100vh",
      background:"#080808",
      paddingBottom:60
    }}>

      {/* HEADER */}

      <div style={{
        background:"#000",
        borderBottom:"3px solid #f5d800",
        padding:"18px 20px 16px",
        display:"flex",
        alignItems:"center",
        gap:14,
        position:"sticky",
        top:0,
        zIndex:10
      }}>

        <div>

          <div style={{
            fontSize:28,
            fontWeight:900,
            color:"#fff",
            letterSpacing:"0.08em"
          }}>
            YD <span style={{color:"#f5d800"}}>BOX</span>
          </div>

          <div style={{
            fontSize:10,
            color:"#555",
            fontWeight:700,
            letterSpacing:"0.2em"
          }}>
            CALCULADORA DE PAPELÃO
          </div>

        </div>

      </div>

      <div style={{
        maxWidth:600,
        margin:"0 auto",
        padding:"24px 16px 0"
      }}>

        {/* NOVA CAIXA */}

        <BoxPreview
          comp={comp}
          larg={larg}
          alt={alt}
        />

        {/* RESTO DA SUA CALCULADORA */}

        <Section num="1" title="Medidas internas da caixa">

          <div style={{
            display:"grid",
            gridTemplateColumns:"1fr 1fr 1fr",
            gap:12
          }}>

            <Field
              label="Comprimento"
              value={comp}
              onChange={setComp}
              unit="cm"
            />

            <Field
              label="Largura"
              value={larg}
              onChange={setLarg}
              unit="cm"
            />

            <Field
              label="Altura"
              value={alt}
              onChange={setAlt}
              unit="cm"
            />

          </div>

        </Section>

        <Section num="2" title="Material e preços">

          <div style={{
            display:"grid",
            gridTemplateColumns:"1fr 1fr 1fr",
            gap:12
          }}>

            <Field
              label="Gramatura"
              value={gram}
              onChange={setGram}
              unit="g/m²"
            />

            <Field
              label="Venda"
              value={precoVenda}
              onChange={setPrecoVenda}
              unit="R$/kg"
            />

            <Field
              label="Custo"
              value={precoCusto}
              onChange={setPrecoCusto}
              unit="R$/kg"
            />

          </div>

        </Section>

        <Section num="3" title="Quantidade">

          <Field
            label="Quantidade do pedido"
            value={qtd}
            onChange={setQtd}
            unit="un"
          />

        </Section>

        {calc && (

          <div className="fadeUp">

            <div style={{
              background:"#000",
              border:"2px solid #f5d800",
              borderRadius:12,
              overflow:"hidden"
            }}>

              <div style={{
                background:"#f5d800",
                padding:"10px 18px",
                display:"flex",
                justifyContent:"space-between"
              }}>

                <span style={{
                  fontSize:11,
                  fontWeight:900,
                  letterSpacing:"0.18em",
                  color:"#000"
                }}>
                  TOTAL DO PEDIDO
                </span>

                <span style={{
                  fontSize:13,
                  fontWeight:900,
                  color:"#000"
                }}>
                  {qtd} unidades
                </span>

              </div>

              <div style={{
                padding:"20px 18px"
              }}>

                <CalcRow
                  label="Venda Total"
                  formula="Valor final"
                  result={fmtBRL(calc.vendaTotal)}
                  yellow
                />

                <CalcRow
                  label="Lucro Total"
                  formula="Lucro calculado"
                  result={fmtBRL(calc.lucroTotal)}
                  last
                />

              </div>

            </div>

          </div>

        )}

      </div>

    </div>

  );

}

ReactDOM
  .createRoot(document.getElementById("root"))
  .render(<App/>);

</script>

</body>
</html>
