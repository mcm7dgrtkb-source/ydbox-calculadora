
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000"/>

<title>YD BOX — Calculadora</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  font-family:'Barlow Condensed',sans-serif;
  color:white;
}

input{
  width:100%;
  background:#111;
  border:1px solid #2b2b2b;
  border-radius:10px;
  padding:14px;
  color:white;
  font-size:18px;
  font-family:'Barlow Condensed';
  outline:none;
}

input:focus{
  border-color:#f5d800;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:30px;
  border-bottom:2px solid #f5d800;
  padding-bottom:20px;
}

.logo{
  font-size:42px;
  font-weight:900;
}

.logo span{
  color:#f5d800;
}

.subtitle{
  color:#666;
  font-size:14px;
  letter-spacing:3px;
}

.grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:30px;
}

.card{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
}

.section-title{
  font-size:12px;
  letter-spacing:3px;
  color:#f5d800;
  margin-bottom:16px;
  font-weight:800;
}

.fields{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.label{
  margin-bottom:6px;
  color:#777;
  font-size:12px;
}

.result{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #1f1f1f;
}

.result:last-child{
  border:none;
}

.result-name{
  color:#777;
}

.result-value{
  font-weight:800;
  color:#f5d800;
}

.total-box{
  background:#000;
  border:2px solid #f5d800;
  border-radius:18px;
  padding:20px;
}

.total-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
  margin-top:20px;
}

.total-item{
  background:#111;
  border-radius:12px;
  padding:18px;
  text-align:center;
}

.total-item h3{
  color:#666;
  font-size:12px;
  margin-bottom:8px;
}

.total-item p{
  font-size:22px;
  font-weight:900;
}

.mockup{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:18px;
  min-height:700px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}

.zoom-controls {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  gap: 8px;
  z-index: 10;
}

.zoom-btn {
  background: #111;
  border: 1px solid #333;
  color: white;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Barlow Condensed';
  font-size: 16px;
  font-weight: 700;
  transition: all 0.2s;
}

.zoom-btn:hover {
  border-color: #f5d800;
  color: #f5d800;
}

.mockup-logo-container {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 90px;
  height: 90px;
  background: #000;
  border: 1.5px solid white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

svg{
  width:100%;
  max-width:800px;
  transition: transform 0.2s ease-out;
}

@media(max-width:900px){
.grid{ grid-template-columns:1fr; }
.mockup{ min-height:500px; }
.mockup-logo-container { width: 70px; height: 70px; }
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useMemo}=React;

const fmt=(n,d=2)=>
n.toLocaleString('pt-BR',{
minimumFractionDigits:d,
maximumFractionDigits:d
});

const money=(n)=>"R$ "+fmt(n);

function App(){

// Valores padrão inicializados agora em milímetros (Exemplo equivalente a 30cm x 20cm x 15cm)
const [comp,setComp]=useState(300);
const [larg,setLarg]=useState(200);
const [alt,setAlt]=useState(150);

const [gram,setGram]=useState(380);
const [venda,setVenda]=useState(14);
const [custo,setCusto]=useState(8);

const [qtd,setQtd]=useState(100);
const [zoom, setZoom] = useState(1.0);

const calc=useMemo(()=>{
const c=Number(comp)||0;
const l=Number(larg)||0;
const a=Number(alt)||0;
const g=Number(gram)||0;
const pv=Number(venda)||0;
const pc=Number(custo)||0;
const q=Number(qtd)||0;

// Folga técnica convertida proporcionalmente de 0.4cm para 4mm
const cVar=c+4;
const lVar=l+4;

// Desenvolvimento horizontal e vertical calculados em mm
const devHoriz=(2*cVar)+(2*lVar)+30; // 3cm de orelha colagem = 30mm
const abaTop=lVar/2;
const abaBot=cVar/2;
const devVert=a+abaTop+abaBot;

// Área em mm²
const areaMm2=devHoriz*devVert;

// Conversão matemática crucial: 1 m² equivale a 1.000.000 mm²
const areaM2=areaMm2/1000000;

// Pesos baseados na área calculada convertida
const pesoGramas=areaM2*g;
const pesoKg=pesoGramas/1000;

const custoUnit=pesoKg*pc;
const vendaUnit=pesoKg*pv;
const lucroUnit=vendaUnit-custoUnit;

return{
areaMm2,
pesoGramas,
custoTotal:custoUnit*q,
vendaTotal:vendaUnit*q,
lucroTotal:lucroUnit*q,
margem:vendaUnit > 0 ? (lucroUnit/vendaUnit)*100 : 0
};
},[comp,larg,alt,gram,venda,custo,qtd]);

const handleZoomIn = () => setZoom(prev => Math.min(prev + 0.15, 2.0));
const handleZoomOut = () => setZoom(prev => Math.max(prev - 0.15, 0.4));
const handleZoomReset = () => setZoom(1.0);

return(

<div className="container">

<div className="header">
<div>
<div className="logo">YD <span>BOX</span></div>
<div className="subtitle">CALCULADORA DE PAPELÃO (MM)</div>
</div>
</div>

<div className="grid">

{/* ESQUERDA */}
<div>
<div className="card">
<div className="section-title">MEDIDAS (EM MILÍMETROS)</div>
<div className="fields">
<div>
<div className="label">COMPRIMENTO (mm)</div>
<input type="number" value={comp} onChange={(e)=>setComp(e.target.value)}/>
</div>
<div>
<div className="label">LARGURA (mm)</div>
<input type="number" value={larg} onChange={(e)=>setLarg(e.target.value)}/>
</div>
<div>
<div className="label">ALTURA (mm)</div>
<input type="number" value={alt} onChange={(e)=>setAlt(e.target.value)}/>
</div>
</div>
</div>

<div className="card">
<div className="section-title">MATERIAL</div>
<div className="fields">
<div>
<div className="label">GRAMATURA (g/m²)</div>
<input type="number" value={gram} onChange={(e)=>setGram(e.target.value)}/>
</div>
<div>
<div className="label">VENDA R$/KG</div>
<input type="number" value={venda} onChange={(e)=>setVenda(e.target.value)}/>
</div>
<div>
<div className="label">CUSTO R$/KG</div>
<input type="number" value={custo} onChange={(e)=>setCusto(e.target.value)}/>
</div>
</div>
</div>

<div className="card">
<div className="section-title">QUANTIDADE</div>
<input type="number" value={qtd} onChange={(e)=>setQtd(e.target.value)}/>
</div>

<div className="card">
<div className="section-title">CÁLCULO</div>
<div className="result"><div className="result-name">Área Total</div><div className="result-value">{fmt(calc.areaMm2, 0)} mm²</div></div>
<div className="result"><div className="result-name">Peso por Caixa</div><div className="result-value">{fmt(calc.pesoGramas)} g</div></div>
<div className="result"><div className="result-name">Margem</div><div className="result-value">{fmt(calc.margem)}%</div></div>
</div>

<div className="total-box">
<h2 style={{fontSize:'28px'}}>TOTAL DO PEDIDO</h2>
<div className="total-grid">
<div className="total-item"><h3>CUSTO</h3><p style={{color:'#999'}}>{money(calc.custoTotal)}</p></div>
<div className="total-item"><h3>VENDA</h3><p style={{color:'#f5d800'}}>{money(calc.vendaTotal)}</p></div>
<div className="total-item"><h3>LUCRO</h3><p style={{color:'#4dcc7a'}}>{money(calc.lucroTotal)}</p></div>
</div>
</div>
</div>

{/* DIREITA - MOCKUP */}
<div className="mockup">
  
  <div className="zoom-controls">
    <button className="zoom-btn" onClick={handleZoomIn}>Zoom +</button>
    <button className="zoom-btn" onClick={handleZoomOut}>Zoom -</button>
    <button className="zoom-btn" onClick={handleZoomReset} style={{fontSize:'12px', opacity: 0.6}}>Reset</button>
  </div>

  <div className="mockup-logo-container">
    <svg viewBox="0 0 100 100" style={{width: '90%', height: '90%'}}>
      <g transform="translate(5, 5)">
        <text x="5" y="52" fill="white" fontSize="48" fontWeight="900" fontFamily="sans-serif" letterSpacing="-2">Y</text>
        <path d="M42 16 H68 C82 16, 88 26, 88 36 C88 47, 82 56, 68 56 H42 Z" fill="white" />
        <path d="M54 25 H65 C73 25, 77 30, 77 36 C77 42, 73 47, 65 47 H54 Z" fill="#000" />
        
        <g transform="translate(55, 27) scale(0.24)">
          <polygon points="30,0 60,15 30,30 0,15" fill="#f5d800" stroke="#000" strokeWidth="5"/>
          <polygon points="0,15 30,30 30,65 0,50" fill="white" stroke="#000" strokeWidth="5"/>
          <polygon points="30,30 60,15 60,50 30,65" fill="white" stroke="#000" strokeWidth="5"/>
        </g>
        
        <text x="50" y="80" fill="white" fontSize="13" fontWeight="bold" fontFamily="sans-serif" letterSpacing="4">BOX</text>
      </g>
    </svg>
  </div>

  <svg viewBox="0 0 900 750" style={{ transform: `scale(${zoom})` }}>
  <defs>
    <linearGradient id="innerShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#000000" stopOpacity="0.65" />
      <stop offset="100%" stopColor="#000000" stopOpacity="0" />
    </linearGradient>
  </defs>

  {(() => {
    const cNum = Math.max(Number(comp) || 0, 1);
    const lNum = Math.max(Number(larg) || 0, 1);
    const aNum = Math.max(Number(alt) || 0, 1);

    const maxDim = Math.max(cNum, lNum, aNum);
    // Fator ajustado para manter a proporção com entradas maiores em mm
    const fatorGlobal = 230 / maxDim;

    const w = cNum * fatorGlobal; 
    const d = lNum * fatorGlobal; 
    const h = aNum * fatorGlobal; 

    const flapSize = d / 2;

    const cx = 450;
    const cy = 385 + (h / 2) - ((w / 4) + (d / 4)) / 2;

    return (
      <g>
        {/* 1. FUNDO INTERNO */}
        <polygon
          points={`${cx},${cy} ${cx - w},${cy - w/2} ${cx - w + d},${cy - w/2 - d/2} ${cx + d},${cy - d/2}`}
          fill="#6a3b08"
          stroke="#422403"
          strokeWidth="1.5"
        />

        {/* 2. PAREDES INTERNAS */}
        <polygon
          points={`${cx - w},${cy - w/2} ${cx - w + d},${cy - w/2 - d/2} ${cx - w + d},${cy - w/2 - d/2 - h} ${cx - w},${cy - w/2 - h}`}
          fill="#7d470d"
        />
        <polygon
          points={`${cx + d},${cy - d/2} ${cx - w + d},${cy - w/2 - d/2} ${cx - w + d},${cy - w/2 - d/2 - h} ${cx + d},${cy - d/2 - h}`}
          fill="#8e5313"
        />
        
        <polygon
          points={`${cx},${cy} ${cx - w},${cy - w/2} ${cx - w + d},${cy - w/2 - d/2} ${cx + d},${cy - d/2}`}
          fill="url(#innerShadow)"
          style={{mixBlendMode: 'multiply'}}
        />

        {/* 3. ABAS TRASEIRAS */}
        <polygon
          points={`
            ${cx - w},${cy - w/2 - h} 
            ${cx - w + d},${cy - w/2 - d/2 - h} 
            ${cx - w + d - flapSize},${cy - w/2 - d/2 - h - flapSize/2} 
            ${cx - w - flapSize},${cy - w/2 - h - flapSize/2}
          `}
          fill="#a06320"
          stroke="#73420f"
          strokeWidth="2"
        />
        <polygon
          points={`
            ${cx + d},${cy - d/2 - h} 
            ${cx - w + d},${cy - w/2 - d/2 - h} 
            ${cx - w + d + flapSize},${cy - w/2 - d/2 - h - flapSize/2} 
            ${cx + d + flapSize},${cy - d/2 - h - flapSize/2}
          `}
          fill="#ad6d25"
          stroke="#73420f"
          strokeWidth="2"
        />

        {/* 4. PAREDES EXTERNAS */}
        <polygon
          points={`${cx},${cy} ${cx - w},${cy - w/2} ${cx - w},${cy - w/2 - h} ${cx},${cy - h}`}
          fill="#c8893d"
          stroke="#8b5c1c"
          strokeWidth="3"
        />
        <polygon
          points={`${cx},${cy} ${cx + d},${cy - d/2} ${cx + d},${cy - d/2 - h} ${cx},${cy - h}`}
          fill="#b67831"
          stroke="#8b5c1c"
          strokeWidth="3"
        />

        {/* 5. ABAS DIANTEIRAS */}
        <polygon
          points={`
            ${cx},${cy - h} 
            ${cx - w},${cy - w/2 - h} 
            ${cx - w - flapSize},${cy - w/2 - h + flapSize/2} 
            ${cx - flapSize},${cy - h + flapSize/2}
          `}
          fill="#dca04d"
          stroke="#8b5c1c"
          strokeWidth="3"
        />
        <polygon
          points={`
            ${cx},${cy - h} 
            ${cx + d},${cy - d/2 - h} 
            ${cx + d + flapSize},${cy - d/2 - h + flapSize/2} 
            ${cx + flapSize},${cy - h + flapSize/2}
          `}
          fill="#e4aa57"
          stroke="#8b5c1c"
          strokeWidth="3"
        />

        {/* TEXTOS DE MEDIDA EM MILÍMETROS */}
        <text x={cx - w/2} y={cy + 45} fill="#f5d800" fontSize="26" fontWeight="900" textAnchor="middle">{comp} mm</text>
        <text x={cx + d/2 + 45} y={cy - d/4 + 40} fill="#f5d800" fontSize="26" fontWeight="900" textAnchor="middle">{larg} mm</text>
        <text x={cx - w - 45} y={cy - w/2 - h/2 + 15} fill="#f5d800" fontSize="26" fontWeight="900" textAnchor="middle">{alt} mm</text>
      </g>
    );
  })()}
</svg>
</div>

</div>
</div>

);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>

```
