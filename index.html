<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YD BOX</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#080808;
font-family:'Barlow Condensed',sans-serif;
}

input{
font-family:'Barlow Condensed',sans-serif;
}

input[type=number]::-webkit-inner-spin-button{
opacity:0.3;
filter:invert(1);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(12px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.fadeUp{
animation:fadeUp .3s ease both;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useMemo}=React;

const fmt=(n,d=2)=>n.toLocaleString('pt-BR',{
minimumFractionDigits:d,
maximumFractionDigits:d
});

const fmtBRL=(n)=>'R$ '+fmt(n,2);

function Field({
label,
value,
onChange,
unit,
step='any'
}){

return(

<div style={{
display:'flex',
flexDirection:'column',
gap:6
}}>

<label style={{
fontSize:10,
fontWeight:800,
letterSpacing:'0.14em',
color:'#777',
textTransform:'uppercase'
}}>
{label}
</label>

<div style={{
display:'flex',
alignItems:'center',
background:'#111',
border:'1px solid #2a2a2a',
borderRadius:8,
overflow:'hidden'
}}>

<input
type="number"
step={step}
value={value}
onChange={(e)=>onChange(Number(e.target.value))}
style={{
flex:1,
background:'transparent',
border:'none',
outline:'none',
padding:'14px',
fontSize:20,
fontWeight:700,
color:'#fff'
}}
/>

<div style={{
padding:'0 14px',
fontSize:11,
fontWeight:700,
color:'#666'
}}>
{unit}
</div>

</div>

</div>

);

}

function Card({title,value,color='#fff'}){

return(

<div style={{
background:'#0d0d0d',
border:'1px solid #1f1f1f',
borderRadius:12,
padding:16
}}>

<div style={{
fontSize:10,
letterSpacing:'0.12em',
color:'#666',
marginBottom:6
}}>
{title}
</div>

<div style={{
fontSize:28,
fontWeight:900,
color
}}>
{value}
</div>

</div>

);

}

function App(){

const [comp,setComp]=useState(30);
const [larg,setLarg]=useState(20);
const [alt,setAlt]=useState(15);

const [gram,setGram]=useState(380);
const [venda,setVenda]=useState(14);
const [custo,setCusto]=useState(8);

const [qtd,setQtd]=useState(100);

const calc=useMemo(()=>{

const area=((comp*larg)*2+(alt*larg)*2+(alt*comp)*2)/10000;

const peso=(area*gram)/1000;

const custoUnit=peso*custo;
const vendaUnit=peso*venda;
const lucroUnit=vendaUnit-custoUnit;

return{

area,
peso,
custoUnit,
vendaUnit,
lucroUnit,

custoTotal:custoUnit*qtd,
vendaTotal:vendaUnit*qtd,
lucroTotal:lucroUnit*qtd,

margem:(lucroUnit/vendaUnit)*100

};

},[
comp,
larg,
alt,
gram,
venda,
custo,
qtd
]);

return(

<div style={{
minHeight:'100vh',
background:'#080808',
paddingBottom:50
}}>

<div style={{
background:'#000',
borderBottom:'3px solid #f5d800',
padding:'20px'
}}>

<div style={{
fontSize:34,
fontWeight:900,
color:'#fff'
}}>
YD <span style={{color:'#f5d800'}}>BOX</span>
</div>

<div style={{
fontSize:10,
letterSpacing:'0.18em',
color:'#666'
}}>
CALCULADORA DE PAPELÃO
</div>

</div>

<div style={{
maxWidth:650,
margin:'0 auto',
padding:'24px 16px'
}}>

{/* CAMPOS */}

<div style={{
display:'grid',
gridTemplateColumns:'1fr 1fr 1fr',
gap:12,
marginBottom:18
}}>

<Field
label="Comprimento"
value={comp}
onChange={setComp}
unit="cm"
/>

<Field
label="Largura"
value={larg}
onChange={setLarg}
unit="cm"
/>

<Field
label="Altura"
value={alt}
onChange={setAlt}
unit="cm"
/>

</div>

<div style={{
display:'grid',
gridTemplateColumns:'1fr 1fr 1fr',
gap:12,
marginBottom:18
}}>

<Field
label="Gramatura"
value={gram}
onChange={setGram}
unit="g/m²"
/>

<Field
label="Venda"
value={venda}
onChange={setVenda}
unit="R$/kg"
/>

<Field
label="Custo"
value={custo}
onChange={setCusto}
unit="R$/kg"
/>

</div>

<Field
label="Quantidade"
value={qtd}
onChange={setQtd}
unit="un"
/>

{/* MOCKUP */}

<div className="fadeUp" style={{
marginTop:26,
background:'#0d0d0d',
border:'1px solid #1f1f1f',
borderRadius:20,
padding:'30px 20px',
display:'flex',
justifyContent:'center',
overflow:'hidden'
}}>

<div style={{
position:'relative',
width:340,
height:270
}}>

{/* TAMPA TRASEIRA */}

<div style={{
position:'absolute',
top:18,
left:70,
width:190,
height:55,
background:'#d7a14d',
clipPath:'polygon(0 100%,50% 0,100% 100%)'
}}/>

{/* ABA ESQ */}

<div style={{
position:'absolute',
top:50,
left:48,
width:85,
height:70,
background:'#bc8035',
clipPath:'polygon(100% 100%,0 20%,0 0,100% 55%)'
}}/>

{/* ABA DIR */}

<div style={{
position:'absolute',
top:50,
left:198,
width:85,
height:70,
background:'#bc8035',
clipPath:'polygon(0 100%,100% 20%,100% 0,0 55%)'
}}/>

{/* LATERAL ESQ */}

<div style={{
position:'absolute',
top:90,
left:20,
width:75,
height:130,
background:'#8e5c24',
clipPath:'polygon(100% 0,0 18%,0 100%,100% 82%)'
}}>

<div style={{
position:'absolute',
left:-20,
top:'50%',
transform:'rotate(-90deg)',
fontSize:14,
fontWeight:900,
color:'#f5d800',
letterSpacing:'0.12em'
}}>
ALT {alt}cm
</div>

</div>

{/* FRENTE */}

<div style={{
position:'absolute',
top:90,
left:92,
width:170,
height:130,
background:'linear-gradient(135deg,#ca8b39,#a76b2a)',
border:'2px solid rgba(255,255,255,0.06)',
boxShadow:'0 18px 35px rgba(0,0,0,0.45)'
}}>

<div style={{
position:'absolute',
bottom:-30,
width:'100%',
textAlign:'center',
fontSize:15,
fontWeight:900,
letterSpacing:'0.12em',
color:'#f5d800'
}}>
COMP {comp}cm
</div>

</div>

{/* LATERAL DIR */}

<div style={{
position:'absolute',
top:90,
left:260,
width:58,
height:130,
background:'#7d501d',
clipPath:'polygon(0 0,100% 18%,100% 100%,0 82%)'
}}>

<div style={{
position:'absolute',
right:-28,
top:'50%',
transform:'rotate(90deg)',
fontSize:14,
fontWeight:900,
color:'#f5d800',
letterSpacing:'0.12em',
whiteSpace:'nowrap'
}}>
LARG {larg}cm
</div>

</div>

{/* SOMBRA */}

<div style={{
position:'absolute',
bottom:10,
left:70,
width:190,
height:28,
background:'rgba(0,0,0,0.45)',
filter:'blur(12px)',
borderRadius:'50%'
}}/>

</div>

</div>

{/* RESULTADOS */}

<div style={{
display:'grid',
gridTemplateColumns:'1fr 1fr',
gap:14,
marginTop:20
}}>

<Card
title="PESO POR CAIXA"
value={`${fmt(calc.peso,3)} kg`}
/>

<Card
title="ÁREA TOTAL"
value={`${fmt(calc.area,3)} m²`}
/>

<Card
title="VENDA TOTAL"
value={fmtBRL(calc.vendaTotal)}
color="#f5d800"
/>

<Card
title="LUCRO TOTAL"
value={fmtBRL(calc.lucroTotal)}
color="#49d17d"
/>

</div>

<div style={{
marginTop:20,
background:'#000',
border:'2px solid #f5d800',
borderRadius:16,
padding:'20px',
textAlign:'center'
}}>

<div style={{
fontSize:11,
letterSpacing:'0.16em',
color:'#666',
marginBottom:8
}}>
MARGEM SOBRE VENDA
</div>

<div style={{
fontSize:48,
fontWeight:900,
color:'#f5d800'
}}>
{fmt(calc.margem,1)}%
</div>

</div>

</div>

</div>

);

}

ReactDOM.createRoot(
document.getElementById('root')
).render(<App/>);

</script>

</body>
</html>
