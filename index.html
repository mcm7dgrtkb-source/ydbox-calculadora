<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="YD Box"/>
  <title>YD Box — Calculadora</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      background:#080808;
      font-family:'Barlow Condensed',sans-serif;
      overflow-x:hidden;
    }

    input[type=number]::-webkit-inner-spin-button{
      opacity:0.3;
      filter:invert(1);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(14px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .fadeUp{
      animation:fadeUp .3s ease both;
    }

    @keyframes flap{
      0%{transform:rotateX(0deg);}
      50%{transform:rotateX(-55deg);}
      100%{transform:rotateX(0deg);}
    }

  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useMemo } = React;

const fmt = (n,d=2)=>
  n.toLocaleString("pt-BR",{
    minimumFractionDigits:d,
    maximumFractionDigits:d
  });

const fmtBRL = (n)=>"R$ "+fmt(n,2);

function Field({
  label,
  value,
  onChange,
  unit,
  hint,
  step="any",
  min=0
}){

  const [focused,setFocused]=useState(false);

  return(
    <div style={{
      display:"flex",
      flexDirection:"column",
      gap:6
    }}>

      <label style={{
        fontSize:9,
        fontWeight:800,
        letterSpacing:"0.18em",
        textTransform:"uppercase",
        color:focused?"#f5d800":"#666"
      }}>
        {label}
      </label>

      <div style={{
        display:"flex",
        alignItems:"center",
        background:"#111",
        border:`1.5px solid ${focused?"#f5d800":"#333"}`,
        borderRadius:8,
        overflow:"hidden"
      }}>

        <input
          type="number"
          min={min}
          step={step}
          value={value}
          onFocus={()=>setFocused(true)}
          onBlur={()=>setFocused(false)}
          onChange={e=>onChange(
            e.target.value===""
            ? ""
            : Number(e.target.value)
          )}
          style={{
            flex:1,
            border:"none",
            background:"transparent",
            padding:"12px 14px",
            fontSize:18,
            fontFamily:"'Barlow Condensed'",
            fontWeight:700,
            color:"#fff",
            outline:"none",
            width:0
          }}
        />

        {unit&&(
          <span style={{
            padding:"0 12px",
            color:"#666",
            fontSize:11,
            fontWeight:700
          }}>
            {unit}
          </span>
        )}

      </div>

      {hint&&(
        <span style={{
          fontSize:9,
          color:"#444"
        }}>
          {hint}
        </span>
      )}

    </div>
  );

}

function Section({num,title,children}){

  return(
    <div style={{marginBottom:18}}>

      <div style={{
        display:"flex",
        alignItems:"center",
        gap:10,
        marginBottom:12
      }}>

        <div style={{
          width:24,
          height:24,
          background:"#f5d800",
          borderRadius:4,
          display:"flex",
          alignItems:"center",
          justifyContent:"center",
          fontSize:11,
          fontWeight:900,
          color:"#000"
        }}>
          {num}
        </div>

        <span style={{
          fontSize:11,
          fontWeight:800,
          letterSpacing:"0.14em",
          textTransform:"uppercase",
          color:"#999"
        }}>
          {title}
        </span>

        <div style={{
          flex:1,
          height:1,
          background:"#222"
        }}/>

      </div>

      <div style={{
        background:"#0d0d0d",
        borderRadius:14,
        padding:"18px 16px",
        border:"1px solid #222"
      }}>
        {children}
      </div>

    </div>
  );

}

function App(){

  const [comp,setComp]=useState(30);
  const [larg,setLarg]=useState(20);
  const [alt,setAlt]=useState(15);

  const [gram,setGram]=useState(380);
  const [precoVenda,setPrecoVenda]=useState(14);
  const [precoCusto,setPrecoCusto]=useState(8);

  const [qtd,setQtd]=useState(100);

  const calc=useMemo(()=>{

    const c=Number(comp)||0;
    const l=Number(larg)||0;
    const a=Number(alt)||0;

    const g=Number(gram)||0;
    const pv=Number(precoVenda)||0;
    const pc=Number(precoCusto)||0;
    const q=Number(qtd)||0;

    if(!c||!l||!a||!g||!pv||!pc||!q){
      return null;
    }

    const area=((c*l*a)/1000000);

    const custo=area*pc*q;
    const venda=area*pv*q;

    return{
      custo,
      venda,
      lucro:venda-custo
    };

  },[
    comp,
    larg,
    alt,
    gram,
    precoVenda,
    precoCusto,
    qtd
  ]);

  return(

    <div style={{
      minHeight:"100vh",
      background:"#080808",
      paddingBottom:80
    }}>

      {/* HEADER */}

      <div style={{
        background:"#000",
        borderBottom:"3px solid #f5d800",
        padding:"20px",
        position:"sticky",
        top:0,
        zIndex:10
      }}>

        <div style={{
          fontSize:34,
          fontWeight:900,
          letterSpacing:"0.08em",
          color:"#fff"
        }}>
          YD <span style={{color:"#f5d800"}}>BOX</span>
        </div>

        <div style={{
          color:"#555",
          fontSize:11,
          letterSpacing:"0.2em",
          marginTop:4,
          fontWeight:700
        }}>
          CALCULADORA DE PAPELÃO
        </div>

      </div>

      <div style={{
        maxWidth:700,
        margin:"0 auto",
        padding:"22px 16px 0"
      }}>

        {/* CAIXA VISUAL */}

        <div style={{
          background:"#0d0d0d",
          border:"1px solid #222",
          borderRadius:18,
          padding:"30px 10px 50px",
          marginBottom:18
        }}>

          <div style={{
            textAlign:"center",
            marginBottom:22,
            color:"#666",
            fontSize:11,
            fontWeight:800,
            letterSpacing:"0.18em",
            textTransform:"uppercase"
          }}>
            Visual da Caixa
          </div>

          <div style={{
            display:"flex",
            justifyContent:"center",
            alignItems:"center"
          }}>

            <div style={{
              position:"relative",
              width:`${120 + comp*2}px`,
              height:`${70 + alt*2}px`,
              transition:"0.4s ease"
            }}>

              {/* TAMPA ESQ */}

              <div style={{
                position:"absolute",
                width:"50%",
                height:"34px",
                background:"#c38b54",
                top:"-24px",
                left:"0",
                transformOrigin:"bottom",
                transform:"skewX(-20deg)",
                animation:"flap 3s ease-in-out infinite",
                border:"1px solid #9c6a3c"
              }}/>

              {/* TAMPA DIR */}

              <div style={{
                position:"absolute",
                width:"50%",
                height:"34px",
                background:"#b67d47",
                top:"-24px",
                right:"0",
                transformOrigin:"bottom",
                transform:"skewX(20deg)",
                animation:"flap 3s ease-in-out infinite",
                border:"1px solid #9c6a3c"
              }}/>

              {/* LATERAL */}

              <div style={{
                position:"absolute",
                width:`${40+larg}px`,
                height:"100%",
                left:"-34px",
                background:"#996635",
                transform:"skewY(35deg)",
                border:"1px solid #7c512b"
              }}/>

              {/* FRENTE */}

              <div style={{
                position:"absolute",
                width:"100%",
                height:"100%",
                background:"#c88b50",
                border:"2px solid #9f6d3f",
                borderRadius:4,
                display:"flex",
                alignItems:"center",
                justifyContent:"center",
                boxShadow:"0 20px 40px rgba(0,0,0,0.45)"
              }}>

                <div style={{textAlign:"center"}}>

                  <div style={{
                    fontSize:38,
                    fontWeight:900,
                    color:"#111",
                    lineHeight:1
                  }}>
                    YD
                  </div>

                  <div style={{
                    fontSize:20,
                    fontWeight:800,
                    letterSpacing:"0.32em",
                    color:"#111"
                  }}>
                    BOX
                  </div>

                </div>

              </div>

              {/* MEDIDAS */}

              <div style={{
                position:"absolute",
                bottom:"-30px",
                width:"100%",
                textAlign:"center",
                color:"#f5d800",
                fontWeight:800,
                fontSize:12
              }}>
                ↔ COMPRIMENTO {comp}cm
              </div>

              <div style={{
                position:"absolute",
                right:"-80px",
                top:"50%",
                transform:"translateY(-50%) rotate(90deg)",
                color:"#f5d800",
                fontWeight:800,
                fontSize:12
              }}>
                ↕ ALTURA {alt}cm
              </div>

              <div style={{
                position:"absolute",
                left:"-90px",
                top:"50%",
                transform:"translateY(-50%) rotate(-35deg)",
                color:"#f5d800",
                fontWeight:800,
                fontSize:12
              }}>
                ↗ LARGURA {larg}cm
              </div>

            </div>

          </div>

        </div>

        {/* CAMPOS */}

        <Section
          num="1"
          title="Medidas internas da caixa"
        >

          <div style={{
            display:"grid",
            gridTemplateColumns:"1fr 1fr 1fr",
            gap:12
          }}>

            <Field
              label="Comprimento"
              value={comp}
              onChange={setComp}
              unit="cm"
            />

            <Field
              label="Largura"
              value={larg}
              onChange={setLarg}
              unit="cm"
            />

            <Field
              label="Altura"
              value={alt}
              onChange={setAlt}
              unit="cm"
            />

          </div>

        </Section>

        <Section
          num="2"
          title="Material e preços"
        >

          <div style={{
            display:"grid",
            gridTemplateColumns:"1fr 1fr 1fr",
            gap:12
          }}>

            <Field
              label="Gramatura"
              value={gram}
              onChange={setGram}
              unit="g/m²"
            />

            <Field
              label="Venda"
              value={precoVenda}
              onChange={setPrecoVenda}
              unit="R$/kg"
            />

            <Field
              label="Custo"
              value={precoCusto}
              onChange={setPrecoCusto}
              unit="R$/kg"
            />

          </div>

        </Section>

        <Section
          num="3"
          title="Quantidade"
        >

          <Field
            label="Quantidade"
            value={qtd}
            onChange={setQtd}
            unit="un"
            step="1"
          />

        </Section>

        {/* RESULTADOS */}

        {calc && (

          <div className="fadeUp">

            <div style={{
              background:"#000",
              border:"2px solid #f5d800",
              borderRadius:16,
              overflow:"hidden"
            }}>

              <div style={{
                background:"#f5d800",
                color:"#000",
                padding:"12px 18px",
                fontWeight:900,
                letterSpacing:"0.16em",
                fontSize:11,
                textTransform:"uppercase"
              }}>
                Resultado do Pedido
              </div>

              <div style={{
                padding:"20px"
              }}>

                <div style={{
                  display:"grid",
                  gridTemplateColumns:"1fr 1fr 1fr",
                  gap:12
                }}>

                  <div style={{
                    background:"#0d0d0d",
                    border:"1px solid #222",
                    borderRadius:10,
                    padding:"16px",
                    textAlign:"center"
                  }}>
                    <div style={{
                      color:"#666",
                      fontSize:10,
                      marginBottom:8,
                      fontWeight:800
                    }}>
                      CUSTO
                    </div>

                    <div style={{
                      color:"#fff",
                      fontSize:20,
                      fontWeight:900
                    }}>
                      {fmtBRL(calc.custo)}
                    </div>
                  </div>

                  <div style={{
                    background:"#0d0d0d",
                    border:"1px solid #222",
                    borderRadius:10,
                    padding:"16px",
                    textAlign:"center"
                  }}>
                    <div style={{
                      color:"#666",
                      fontSize:10,
                      marginBottom:8,
                      fontWeight:800
                    }}>
                      VENDA
                    </div>

                    <div style={{
                      color:"#f5d800",
                      fontSize:20,
                      fontWeight:900
                    }}>
                      {fmtBRL(calc.venda)}
                    </div>
                  </div>

                  <div style={{
                    background:"#0d0d0d",
                    border:"1px solid #222",
                    borderRadius:10,
                    padding:"16px",
                    textAlign:"center"
                  }}>
                    <div style={{
                      color:"#666",
                      fontSize:10,
                      marginBottom:8,
                      fontWeight:800
                    }}>
                      LUCRO
                    </div>

                    <div style={{
                      color:"#4dcc7a",
                      fontSize:20,
                      fontWeight:900
                    }}>
                      {fmtBRL(calc.lucro)}
                    </div>
                  </div>

                </div>

              </div>

            </div>

          </div>

        )}

      </div>

    </div>

  );

}

ReactDOM
  .createRoot(document.getElementById("root"))
  .render(<App/>);

</script>

</body>
</html>
