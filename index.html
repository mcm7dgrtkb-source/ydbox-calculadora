<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#000000"/>
<title>YD BOX — Calculadora</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  font-family:'Barlow Condensed',sans-serif;
  color:white;
}

input{
  width:100%;
  background:#111;
  border:2px solid #2a2a2a;
  border-radius:10px;
  padding:16px;
  color:white;
  font-size:22px;
  font-weight:700;
  outline:none;
}

input:focus{
  border-color:#f5d800;
}

.section{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:18px;
  padding:20px;
  margin-bottom:18px;
}

.title{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}

.number{
  width:34px;
  height:34px;
  background:#f5d800;
  color:black;
  font-weight:900;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.title span{
  color:#999;
  font-size:14px;
  font-weight:900;
  letter-spacing:.18em;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.label{
  margin-bottom:8px;
  color:#666;
  font-size:12px;
  font-weight:800;
  letter-spacing:.12em;
}

.resultBox{
  background:#111;
  border:1px solid #222;
  border-radius:14px;
  padding:18px;
  margin-bottom:12px;
}

.resultLabel{
  color:#666;
  font-size:12px;
  margin-bottom:8px;
  letter-spacing:.1em;
}

.resultValue{
  font-size:28px;
  color:#f5d800;
  font-weight:900;
}

.header{
  background:black;
  border-bottom:4px solid #f5d800;
  padding:24px;
  margin-bottom:24px;
}

.visualBox{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:24px;
  padding:30px 20px 40px;
  margin-bottom:24px;
  overflow:hidden;
}

.visualTitle{
  text-align:center;
  color:#666;
  font-size:14px;
  font-weight:900;
  letter-spacing:.22em;
  margin-bottom:30px;
}

.scene{
  position:relative;
  width:100%;
  height:340px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.measure{
  position:absolute;
  color:#f5d800;
  font-size:18px;
  font-weight:900;
  letter-spacing:.05em;
}

.altura{
  left:-10px;
  top:50%;
  transform:translateY(-50%) rotate(-90deg);
}

.largura{
  right:0;
  top:70px;
}

.comp{
  bottom:0;
}

.box3d{
  position:relative;
  width:260px;
  height:180px;
}

.top{
  position:absolute;
  top:0;
  left:55px;
  width:160px;
  height:70px;
  background:#e4bf00;
  transform:skewX(-35deg);
  border:3px solid #ffe95c;
}

.side{
  position:absolute;
  top:64px;
  right:0;
  width:52px;
  height:110px;
  background:#b99300;
  transform:skewY(-38deg);
  border-right:3px solid #ffe95c;
  border-bottom:3px solid #ffe95c;
}

.front{
  position:absolute;
  top:76px;
  left:28px;
  width:190px;
  height:120px;
  background:#f5d800;
  border:4px solid #fff07d;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 35px rgba(245,216,0,.25);
}

.frontText{
  color:black;
  font-size:42px;
  font-weight:900;
  letter-spacing:.08em;
}

.flapLeft{
  position:absolute;
  top:34px;
  left:4px;
  width:100px;
  height:60px;
  background:#d1ab00;
  transform-origin:right bottom;
  transform:skewX(-35deg) rotate(-14deg);
  animation:flapLeft 2.8s ease-in-out infinite alternate;
  border:2px solid #ffe95c;
}

.flapRight{
  position:absolute;
  top:38px;
  right:-4px;
  width:100px;
  height:60px;
  background:#d1ab00;
  transform-origin:left bottom;
  transform:skewX(-35deg) rotate(14deg);
  animation:flapRight 2.8s ease-in-out infinite alternate;
  border:2px solid #ffe95c;
}

.flapBack{
  position:absolute;
  top:-18px;
  left:80px;
  width:120px;
  height:70px;
  background:#ecc600;
  transform:skewX(-35deg);
  animation:flapBack 2.8s ease-in-out infinite alternate;
  border:2px solid #ffe95c;
}

.flapFront{
  position:absolute;
  top:70px;
  left:58px;
  width:120px;
  height:48px;
  background:#f5d800;
  border:2px solid #fff07d;
  border-radius:8px;
  animation:flapFront 2.8s ease-in-out infinite alternate;
}

@keyframes flapLeft{
  from{transform:skewX(-35deg) rotate(-8deg);}
  to{transform:skewX(-35deg) rotate(-18deg);}
}

@keyframes flapRight{
  from{transform:skewX(-35deg) rotate(8deg);}
  to{transform:skewX(-35deg) rotate(18deg);}
}

@keyframes flapBack{
  from{transform:skewX(-35deg) translateY(0);}
  to{transform:skewX(-35deg) translateY(-8px);}
}

@keyframes flapFront{
  from{transform:rotate(-2deg);}
  to{transform:rotate(4deg);}
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useMemo} = React;

const fmt = n => n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const brl = n => "R$ " + fmt(n);

function App(){

const [comp,setComp]=useState(30);
const [larg,setLarg]=useState(20);
const [alt,setAlt]=useState(15);

const [gram,setGram]=useState(380);
const [venda,setVenda]=useState(14);
const [custo,setCusto]=useState(8);
const [qtd,setQtd]=useState(100);

const calc = useMemo(()=>{

const area=((comp+larg+alt)/100)*0.9;
const peso=(area*gram)/1000;

const custoUnit=peso*custo;
const vendaUnit=peso*venda;
const lucro=vendaUnit-custoUnit;

const custoTotal=custoUnit*qtd;
const vendaTotal=vendaUnit*qtd;
const lucroTotal=lucro*qtd;

const margem=(lucro/vendaUnit)*100;

return{
peso,
custoUnit,
vendaUnit,
lucro,
custoTotal,
vendaTotal,
lucroTotal,
margem
};

},[comp,larg,alt,gram,venda,custo,qtd]);

return(
<div>

<div className="header">
  <div style={{fontSize:56,fontWeight:900}}>
    YD <span style={{color:"#f5d800"}}>BOX</span>
  </div>

  <div style={{
    color:"#666",
    fontWeight:800,
    letterSpacing:".18em",
    fontSize:16
  }}>
    CALCULADORA DE PAPELÃO
  </div>
</div>

<div style={{padding:"0 18px 50px"}}>

<div className="visualBox">

<div className="visualTitle">
VISUALIZAÇÃO DA CAIXA
</div>

<div className="scene">

<div className="measure altura">
ALTURA: {alt} cm
</div>

<div className="measure largura">
LARGURA: {larg} cm
</div>

<div className="measure comp">
COMPRIMENTO: {comp} cm
</div>

<div className="box3d">

<div className="flapBack"></div>
<div className="flapLeft"></div>
<div className="flapRight"></div>

<div className="top"></div>

<div className="side"></div>

<div className="front">
<div className="frontText">YD BOX</div>
</div>

<div className="flapFront"></div>

</div>
</div>
</div>

<div className="section">

<div className="title">
<div className="number">1</div>
<span>MEDIDAS INTERNAS DA CAIXA</span>
</div>

<div className="grid">

<div>
<div className="label">COMPRIMENTO</div>
<input value={comp} onChange={e=>setComp(Number(e.target.value))}/>
</div>

<div>
<div className="label">LARGURA</div>
<input value={larg} onChange={e=>setLarg(Number(e.target.value))}/>
</div>

<div>
<div className="label">ALTURA</div>
<input value={alt} onChange={e=>setAlt(Number(e.target.value))}/>
</div>

</div>
</div>

<div className="section">

<div className="title">
<div className="number">2</div>
<span>MATERIAL E PREÇOS</span>
</div>

<div className="grid">

<div>
<div className="label">GRAMATURA</div>
<input value={gram} onChange={e=>setGram(Number(e.target.value))}/>
</div>

<div>
<div className="label">VENDA R$/KG</div>
<input value={venda} onChange={e=>setVenda(Number(e.target.value))}/>
</div>

<div>
<div className="label">CUSTO R$/KG</div>
<input value={custo} onChange={e=>setCusto(Number(e.target.value))}/>
</div>

</div>
</div>

<div className="section">

<div className="title">
<div className="number">3</div>
<span>QUANTIDADE</span>
</div>

<div>
<div className="label">QUANTIDADE</div>
<input value={qtd} onChange={e=>setQtd(Number(e.target.value))}/>
</div>

</div>

<div className="resultBox">
<div className="resultLabel">PESO POR CAIXA</div>
<div className="resultValue">{fmt(calc.peso)} kg</div>
</div>

<div className="resultBox">
<div className="resultLabel">VENDA TOTAL</div>
<div className="resultValue">{brl(calc.vendaTotal)}</div>
</div>

<div className="resultBox">
<div className="resultLabel">LUCRO TOTAL</div>
<div className="resultValue">{brl(calc.lucroTotal)}</div>
</div>

<div className="resultBox">
<div className="resultLabel">MARGEM SOBRE VENDA</div>
<div className="resultValue">{fmt(calc.margem)}%</div>
</div>

</div>
</div>
);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
