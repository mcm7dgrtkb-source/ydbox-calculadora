<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="YD Box"/>

  <title>YD Box — Calculadora</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      background:#080808;
      font-family:'Barlow Condensed',sans-serif;
      overflow-x:hidden;
    }

    input[type=number]::-webkit-inner-spin-button{
      opacity:0.3;
      filter:invert(1);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(14px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .fadeUp{
      animation:fadeUp 0.3s ease both;
    }

    /* ANIMAÇÃO DA CAIXA */

    .box-container{
      position:fixed;
      top:110px;
      right:20px;
      z-index:999;
    }

    .box{
      position:relative;
      animation:float 3s ease-in-out infinite;
    }

    .lid{
      width:120px;
      height:24px;
      background:#facc15;
      position:absolute;
      top:-20px;
      border-radius:8px 8px 0 0;
      transform-origin:bottom;
      animation:openBox 3s ease-in-out infinite;
    }

    .body-box{
      width:120px;
      height:90px;
      background:#eab308;
      border:3px solid #fde047;
      border-radius:10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:black;
      font-family:Arial;
      font-weight:bold;
      box-shadow:0 10px 30px rgba(255,255,0,0.3);
    }

    .body-box h1{
      font-size:32px;
      margin:0;
    }

    .body-box p{
      margin:0;
      letter-spacing:4px;
    }

    .shadow{
      width:100px;
      height:16px;
      background:rgba(255,255,0,0.2);
      border-radius:50%;
      position:absolute;
      bottom:-24px;
      left:10px;
      filter:blur(8px);
      animation:shadow 3s ease-in-out infinite;
    }

    @keyframes openBox{
      0%,100%{
        transform:rotateX(0deg);
      }
      50%{
        transform:rotateX(-120deg);
      }
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    @keyframes shadow{
      0%,100%{
        transform:scale(1);
        opacity:0.4;
      }
      50%{
        transform:scale(0.8);
        opacity:0.2;
      }
    }
  </style>
</head>

<body>

  <!-- CAIXA ANIMADA -->

  <div class="box-container">
    <div class="box">

      <div class="lid"></div>

      <div class="body-box">
        <h1>YD</h1>
        <p>BOX</p>
      </div>

      <div class="shadow"></div>

    </div>
  </div>

  <!-- APP -->

  <div id="root"></div>

  <script type="text/babel">

    const { useState, useMemo } = React;

    const fmt = (n, d=2) =>
      n.toLocaleString("pt-BR",{
        minimumFractionDigits:d,
        maximumFractionDigits:d
      });

    const fmtBRL = (n) => "R$ " + fmt(n,2);

    function App(){

      return(
        <div style={{
          minHeight:"100vh",
          background:"#080808",
          color:"#fff",
          padding:"40px"
        }}>

          <h1 style={{
            fontSize:"42px",
            fontWeight:"900",
            marginBottom:"20px"
          }}>
            YD BOX
          </h1>

          <p style={{
            color:"#999",
            fontSize:"20px"
          }}>
            Sua calculadora está funcionando com animação 🚀
          </p>

        </div>
      );

    }

    ReactDOM
      .createRoot(document.getElementById("root"))
      .render(<App/>);

  </script>

</body>
</html>
