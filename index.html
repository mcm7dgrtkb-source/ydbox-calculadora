<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YD BOX — Calculadora PRO</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#070707;
  color:white;
  font-family:'Barlow Condensed',sans-serif;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  border-bottom:2px solid #f5d800;
  padding-bottom:18px;
  margin-bottom:25px;
}

.logo{
  font-size:46px;
  font-weight:900;
}

.logo span{
  color:#f5d800;
}

.subtitle{
  color:#777;
  letter-spacing:4px;
  font-size:13px;
}

.grid{
  display:grid;
  grid-template-columns:400px 1fr;
  gap:25px;
}

.card{
  background:#101010;
  border:1px solid #232323;
  border-radius:18px;
  padding:20px;
  margin-bottom:18px;
}

.section-title{
  color:#f5d800;
  font-size:12px;
  letter-spacing:3px;
  margin-bottom:15px;
  font-weight:800;
}

.fields{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.input-group label{
  display:block;
  margin-bottom:6px;
  color:#777;
  font-size:12px;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #2c2c2c;
  background:#181818;
  color:white;
  font-size:18px;
  font-family:'Barlow Condensed';
}

input:focus{
  outline:none;
  border-color:#f5d800;
}

.mockup{
  background:#0f0f0f;
  border:1px solid #222;
  border-radius:22px;
  min-height:760px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:20px;
  overflow:hidden;
}

.scene{
  position:relative;
  width:520px;
  height:520px;
  perspective:1400px;
}

.box{
  position:absolute;
  left:50%;
  top:50%;
  transform-style:preserve-3d;
  transform:
    translate(-50%,-50%)
    rotateX(-22deg)
    rotateY(-32deg);
}

/* BASE */

.face{
  position:absolute;
  border:2px solid #8b5c1c;
  background:#c68a3b;
}

/* FRENTE */
.front{
  transform:translateZ(var(--depth));
}

/* FUNDO */
.back{
  transform:
    rotateY(180deg)
    translateZ(var(--depth));
}

/* LADO ESQUERDO */
.left{
  transform:
    rotateY(-90deg)
    translateZ(var(--depth));
}

/* LADO DIREITO */
.right{
  transform:
    rotateY(90deg)
    translateZ(var(--width));
}

/* BASE */
.bottom{
  background:#b3782d;
  transform:
    rotateX(-90deg)
    translateZ(calc(var(--height) - var(--depth)));
}

/* ABAS REAIS */

.flap-front,
.flap-back,
.flap-left,
.flap-right{
  position:absolute;
  background:#d89a47;
  border:2px solid #8b5c1c;
}

/* ABA FRENTE */
.flap-front{
  transform-origin:bottom;
  transform:
    translateZ(var(--depth))
    translateY(calc(-1 * var(--flapFront)))
    rotateX(-115deg);
}

/* ABA TRÁS */
.flap-back{
  transform-origin:bottom;
  transform:
    rotateY(180deg)
    translateZ(var(--depth))
    translateY(calc(-1 * var(--flapFront)))
    rotateX(-115deg);
}

/* ABA ESQUERDA */
.flap-left{
  transform-origin:left;
  transform:
    rotateY(-90deg)
    translateZ(var(--depth))
    rotateY(-115deg);
}

/* ABA DIREITA */
.flap-right{
  transform-origin:right;
  transform:
    rotateY(90deg)
    translateZ(var(--width))
    rotateY(115deg);
}

.measure{
  position:absolute;
  color:#f5d800;
  font-weight:900;
  text-shadow:0 0 10px black;
}

.measure.c{
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
}

.measure.l{
  right:20px;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
}

.measure.a{
  left:20px;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
}

.measure small{
  display:block;
  color:#888;
  font-size:12px;
  text-align:center;
}

@media(max-width:900px){

.grid{
  grid-template-columns:1fr;
}

.mockup{
  min-height:500px;
  position:relative;
}

.scene{
  transform:scale(.75);
}

}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState}=React;

function App(){

const [comp,setComp]=useState(30);
const [larg,setLarg]=useState(20);
const [alt,setAlt]=useState(15);

const width=Math.max(comp*5,120);
const depth=Math.max(larg*5,80);
const height=Math.max(alt*5,80);

const flapFront=depth*0.55;
const flapSide=width*0.28;

return(

<div className="container">

<div className="header">
<div className="logo">
YD <span>BOX</span>
</div>

<div className="subtitle">
DOBRA AUTOMÁTICA REAL
</div>
</div>

<div className="grid">

<div>

<div className="card">

<div className="section-title">
MEDIDAS DA CAIXA
</div>

<div className="fields">

<div className="input-group">
<label>COMPRIMENTO</label>

<input
type="number"
value={comp}
onChange={(e)=>setComp(Number(e.target.value))}
/>
</div>

<div className="input-group">
<label>LARGURA</label>

<input
type="number"
value={larg}
onChange={(e)=>setLarg(Number(e.target.value))}
/>
</div>

<div className="input-group">
<label>ALTURA</label>

<input
type="number"
value={alt}
onChange={(e)=>setAlt(Number(e.target.value))}
/>
</div>

</div>

</div>

<div className="card">

<div className="section-title">
COMO FUNCIONA
</div>

<p style={{
color:'#999',
lineHeight:'28px',
fontSize:'20px'
}}>
A caixa agora altera automaticamente o tamanho real das abas,
altura, largura e profundidade conforme as medidas digitadas,
simulando uma dobra industrial mais próxima da fabricação real.
</p>

</div>

</div>

<div className="mockup">

<div className="scene">

<div
className="box"
style={{
'--width':`${width}px`,
'--height':`${height}px`,
'--depth':`${depth}px`,
'--flapFront':`${flapFront}px`,
'--flapSide':`${flapSide}px`,
width:`${width}px`,
height:`${height}px`
}}
>

{/* FACES */}

<div
className="face front"
style={{
width:`${width}px`,
height:`${height}px`
}}
></div>

<div
className="face back"
style={{
width:`${width}px`,
height:`${height}px`
}}
></div>

<div
className="face left"
style={{
width:`${depth}px`,
height:`${height}px`
}}
></div>

<div
className="face right"
style={{
width:`${depth}px`,
height:`${height}px`
}}
></div>

<div
className="face bottom"
style={{
width:`${width}px`,
height:`${depth}px`
}}
></div>

{/* ABAS */}

<div
className="flap-front"
style={{
width:`${width}px`,
height:`${flapFront}px`
}}
></div>

<div
className="flap-back"
style={{
width:`${width}px`,
height:`${flapFront}px`
}}
></div>

<div
className="flap-left"
style={{
width:`${flapSide}px`,
height:`${height}px`
}}
></div>

<div
className="flap-right"
style={{
width:`${flapSide}px`,
height:`${height}px`
}}
></div>

</div>

<div className="measure c">
{comp} cm
<small>Comprimento</small>
</div>

<div className="measure l">
{larg} cm
<small>Largura</small>
</div>

<div className="measure a">
{alt} cm
<small>Altura</small>
</div>

</div>

</div>

</div>

</div>

);

}

ReactDOM
.createRoot(document.getElementById('root'))
.render(<App/>);

</script>

</body>
</html>
