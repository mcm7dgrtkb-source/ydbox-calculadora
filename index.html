<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000"/>
<title>YD BOX — Calculadora Avançada</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:#080808; font-family:'Barlow Condensed',sans-serif; color:white; }
input,textarea,select{
  width:100%; background:#111; border:1px solid #2b2b2b;
  border-radius:10px; padding:14px; color:white; font-size:17px;
  font-family:'Barlow Condensed'; outline:none; transition:border-color 0.2s;
}
input:focus,textarea:focus,select:focus{ border-color:#f5d800; }
input.error,select.error{ border-color:#ff5a5a !important; }
select{
  appearance:none;
  background-image:url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23f5d800' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat:no-repeat; background-position:right 14px center; background-size:16px; cursor:pointer;
}
textarea{ resize:vertical; min-height:80px; font-size:15px; color:#888; line-height:1.5; }
.container{ max-width:1280px; margin:auto; padding:20px; }
.header{
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-bottom:28px; border-bottom:2px solid #f5d800; padding-bottom:18px;
}
.logo{ font-size:44px; font-weight:900; line-height:1; }
.logo span{ color:#f5d800; }
.subtitle{ color:#444; font-size:11px; letter-spacing:4px; margin-top:4px; }
.header-actions{ display:flex; gap:10px; align-items:center; }
.header-date{ color:#333; font-size:12px; }
.grid{ display:grid; grid-template-columns:420px 1fr; gap:28px; }
.card{ background:#0d0d0d; border:1px solid #222; border-radius:18px; padding:22px; margin-bottom:18px; }
.card-highlight{ background:#11110b; border:1px dashed #f5d800; border-radius:18px; padding:22px; margin-bottom:18px; }
.section-title{ font-size:11px; letter-spacing:3px; color:#f5d800; margin-bottom:14px; font-weight:900; }
.fields-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.fields-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.label{ margin-bottom:5px; color:#666; font-size:11px; letter-spacing:1px; font-weight:700; }
.label.error-label{ color:#ff5a5a; }
.error-msg{ color:#ff5a5a; font-size:11px; font-weight:700; margin-top:4px; }
.result{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid #1a1a1a; }
.result:last-child{ border:none; }
.result-name{ color:#666; font-size:15px; }
.result-value{ font-weight:900; color:#f5d800; font-size:15px; }
.total-box{ background:#000; border:2px solid #f5d800; border-radius:18px; padding:20px; }
.total-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:16px; }
.total-item{ background:#111; border-radius:12px; padding:16px 10px; text-align:center; }
.total-item h3{ color:#555; font-size:11px; margin-bottom:6px; letter-spacing:2px; }
.total-item p{ font-size:18px; font-weight:900; }
.mat-info{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:12px; }
.mat-info-item{ background:#1a1a10; border-radius:8px; padding:8px 12px; text-align:center; }
.mat-info-item span{ display:block; font-size:10px; color:#555; margin-bottom:3px; }
.mat-info-item strong{ font-size:15px; font-weight:900; color:#f5d800; }
.mockup{
  background:#0d0d0d; border:1px solid #222; border-radius:18px;
  min-height:700px; display:flex; flex-direction:column;
  padding:16px 20px; position:relative; overflow:hidden;
}
.mockup-bg{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
.mockup-controls{ display:flex; gap:8px; z-index:10; margin-bottom:10px; }
.mockup-canvas{
  flex:1; display:flex; align-items:center; justify-content:center;
  z-index:2; cursor:grab; overflow:hidden;
}
.mockup-canvas:active{ cursor:grabbing; }
.mockup-desc{ background:#111; border:1px solid #1f1f1f; border-radius:12px; padding:16px; margin-top:12px; z-index:5; }
.mockup-desc h4{ color:#f5d800; font-size:11px; letter-spacing:2px; margin-bottom:8px; font-weight:900; }
.btn{
  background:#111; border:1px solid #333; color:white;
  padding:8px 14px; border-radius:8px; cursor:pointer;
  font-family:'Barlow Condensed'; font-size:14px; font-weight:900;
  letter-spacing:1px; transition:all 0.15s; user-select:none;
}
.btn:hover{ border-color:#f5d800; color:#f5d800; }
.btn-yellow{ background:#f5d800; border-color:#f5d800; color:#000; }
.btn-yellow:hover{ background:#000; color:#f5d800; }
.summary-section{
  background:#0a0a0a; border:1px solid #222; border-radius:18px;
  padding:28px; margin-top:28px;
}
.summary-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.summary-item{ background:#111; border-radius:10px; padding:12px 16px; }
.summary-item span{ display:block; font-size:10px; color:#555; margin-bottom:4px; letter-spacing:1px; }
.summary-item strong{ font-size:16px; font-weight:900; color:#fff; }
.summary-desc{ margin-top:16px; color:#555; font-size:14px; line-height:1.5; border-top:1px solid #1a1a1a; padding-top:14px; }
/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.88);
  z-index:999; display:flex; align-items:center; justify-content:center; padding:20px;
}
.modal{
  background:#0d0d0d; border:1px solid #f5d800; border-radius:18px;
  padding:28px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto;
}
.modal-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modal-header h2{ color:#f5d800; font-size:18px; letter-spacing:3px; font-weight:900; }
.modal-close{ background:none; border:none; color:#666; font-size:22px; cursor:pointer; line-height:1; }
.modal-close:hover{ color:#fff; }
.modal-tipo{ font-size:11px; color:#f5d800; letter-spacing:3px; margin-bottom:12px; font-weight:900; }
.modal-mat{ background:#111; border-radius:10px; padding:14px; margin-bottom:10px; }
.modal-mat-label{ color:#aaa; font-size:13px; margin-bottom:10px; font-weight:700; }
.modal-fields{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.modal-field-label{ color:#555; font-size:11px; margin-bottom:4px; }
.modal-input{
  width:100%; background:#0a0a0a; border:1px solid #333; border-radius:8px;
  padding:8px 10px; color:white; font-size:15px; font-family:'Barlow Condensed'; outline:none;
}
.modal-input:focus{ border-color:#f5d800; }
.modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:16px; }
.empty-state{ color:#444; font-size:14px; text-align:center; padding:20px 0; }
.footer{ text-align:center; color:#222; font-size:12px; margin-top:28px; letter-spacing:2px; padding-bottom:20px; }
/* PDF */
#pdf-template{ display:none; }
@media(max-width:900px){
  .grid{ grid-template-columns:1fr; }
  .mockup{ min-height:520px; }
  .summary-grid{ grid-template-columns:1fr 1fr; }
}
@media(max-width:500px){
  .fields-3{ grid-template-columns:1fr 1fr; }
  .total-grid{ grid-template-columns:1fr; }
  .summary-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useMemo, useEffect, useRef, useCallback} = React;

const fmt = (n, d=2) => Number(n).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
const money = (n) => 'R$ ' + fmt(n);
const today = new Date().toLocaleDateString('pt-BR');

const DEFAULT_MATERIAIS = {
  duplex:[
    {label:'290g (3.8 Coluna)', gramatura:290, custo:8.79, venda:17.58},
    {label:'355g (4.2 Coluna)', gramatura:355, custo:7.10, venda:14.20},
  ],
  triplex:[
    {label:'470g (6.5 Coluna)', gramatura:470, custo:8.79, venda:17.58},
    {label:'610g (7.0 Coluna)', gramatura:610, custo:7.10, venda:14.20},
  ],
};

function validar(comp, larg, alt, qtd){
  const e = {};
  const c=Number(comp), l=Number(larg), a=Number(alt), q=Number(qtd);
  if(!comp || c<=0) e.comp='Mínimo 1mm'; else if(c>5000) e.comp='Máx. 5000mm';
  if(!larg || l<=0) e.larg='Mínimo 1mm'; else if(l>5000) e.larg='Máx. 5000mm';
  if(!alt  || a<=0) e.alt ='Mínimo 1mm'; else if(a>5000) e.alt ='Máx. 5000mm';
  if(!qtd  || q<=0) e.qtd ='Mínimo 1 un'; else if(q>1000000) e.qtd='Máx. 1.000.000';
  return e;
}

/* ── 3D Box SVG ─────────────────────────────── */
function BoxSVG({w:cNum, h:lNum, d:aNum}){
  const maxDim = Math.max(cNum,lNum,aNum,1);
  const sc = 200/maxDim;
  const w=cNum*sc, d=lNum*sc, h=aNum*sc;
  const fl=d/2, cx=450, cy=370;
  return (
    <g>
      <defs>
        <linearGradient id="shad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#000" stopOpacity="0.55"/>
          <stop offset="100%" stopColor="#000" stopOpacity="0"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <polygon points={`${cx},${cy} ${cx-w},${cy-w/2} ${cx-w+d},${cy-w/2-d/2} ${cx+d},${cy-d/2}`} fill="#6a3b08" stroke="#42240360" strokeWidth="1.5"/>
      <polygon points={`${cx-w},${cy-w/2} ${cx-w+d},${cy-w/2-d/2} ${cx-w+d},${cy-w/2-d/2-h} ${cx-w},${cy-w/2-h}`} fill="#7d470d"/>
      <polygon points={`${cx+d},${cy-d/2} ${cx-w+d},${cy-w/2-d/2} ${cx-w+d},${cy-w/2-d/2-h} ${cx+d},${cy-d/2-h}`} fill="#8e5313"/>
      <polygon points={`${cx},${cy} ${cx-w},${cy-w/2} ${cx-w+d},${cy-w/2-d/2} ${cx+d},${cy-d/2}`} fill="url(#shad)"/>
      <polygon points={`${cx-w},${cy-w/2-h} ${cx-w+d},${cy-w/2-d/2-h} ${cx-w+d-fl},${cy-w/2-d/2-h-fl/2} ${cx-w-fl},${cy-w/2-h-fl/2}`} fill="#a06320" stroke="#73420f60" strokeWidth="1.5"/>
      <polygon points={`${cx+d},${cy-d/2-h} ${cx-w+d},${cy-w/2-d/2-h} ${cx-w+d+fl},${cy-w/2-d/2-h-fl/2} ${cx+d+fl},${cy-d/2-h-fl/2}`} fill="#ad6d25" stroke="#73420f60" strokeWidth="1.5"/>
      <polygon points={`${cx},${cy} ${cx-w},${cy-w/2} ${cx-w},${cy-w/2-h} ${cx},${cy-h}`} fill="#c8893d" stroke="#8b5c1c" strokeWidth="2.5"/>
      <polygon points={`${cx},${cy} ${cx+d},${cy-d/2} ${cx+d},${cy-d/2-h} ${cx},${cy-h}`} fill="#b67831" stroke="#8b5c1c" strokeWidth="2.5"/>
      <polygon points={`${cx},${cy-h} ${cx-w},${cy-w/2-h} ${cx-w-fl},${cy-w/2-h+fl/2} ${cx-fl},${cy-h+fl/2}`} fill="#dca04d" stroke="#8b5c1c" strokeWidth="2"/>
      <polygon points={`${cx},${cy-h} ${cx+d},${cy-d/2-h} ${cx+d+fl},${cy-d/2-h+fl/2} ${cx+fl},${cy-h+fl/2}`} fill="#e4aa57" stroke="#8b5c1c" strokeWidth="2"/>
      <text x={cx-w/2} y={cy+50} fill="#f5d800" fontSize="24" fontWeight="900" textAnchor="middle" filter="url(#glow)">{cNum} mm</text>
      <text x={cx+d/2+50} y={cy-d/4+40} fill="#f5d800" fontSize="24" fontWeight="900" textAnchor="middle" filter="url(#glow)">{lNum} mm</text>
      <g transform={`translate(${cx-w-45},${cy-w/2-h/2})`}>
        <text fill="#f5d800" fontSize="24" fontWeight="900" textAnchor="middle" transform="rotate(-90)" filter="url(#glow)">{aNum} mm</text>
      </g>
    </g>
  );
}

/* ── Modal de Preços ────────────────────────── */
function PrecosModal({materiais, onSave, onClose}){
  const [local, setLocal] = useState(JSON.parse(JSON.stringify(materiais)));
  const upd = (tipo,idx,campo,val) => {
    const cp = JSON.parse(JSON.stringify(local));
    cp[tipo][idx][campo] = parseFloat(val)||0;
    setLocal(cp);
  };
  return (
    <div className="modal-overlay" onClick={(e)=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-header">
          <h2>EDITAR PREÇOS</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {['duplex','triplex'].map(tipo=>(
          <div key={tipo} style={{marginBottom:24}}>
            <div className="modal-tipo">{tipo.toUpperCase()}</div>
            {local[tipo].map((item,idx)=>(
              <div className="modal-mat" key={idx}>
                <div className="modal-mat-label">{item.label}</div>
                <div className="modal-fields">
                  {[['Gramatura (g)','gramatura'],['Custo R$/kg','custo'],['Venda R$/kg','venda']].map(([lbl,campo])=>(
                    <div key={campo}>
                      <div className="modal-field-label">{lbl}</div>
                      <input className="modal-input" type="number" step="0.01" value={item[campo]}
                        onChange={e=>upd(tipo,idx,campo,e.target.value)}/>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        ))}
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-yellow" onClick={()=>{onSave(local);onClose();}}>Salvar Preços</button>
        </div>
      </div>
    </div>
  );
}

/* ── Campo com validação ─────────────────────── */
function Field({label, value, onChange, onBlur, error, suffix='mm'}){
  return (
    <div>
      <div className={'label'+(error?' error-label':'')}>{label}</div>
      <div style={{position:'relative'}}>
        <input type="number" value={value} className={error?'error':''}
          onChange={e=>onChange(e.target.value===''?'':Number(e.target.value))}
          onBlur={onBlur}
          style={{paddingRight: suffix?'40px':'14px'}}/>
        {suffix&&<span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#444',fontSize:13,pointerEvents:'none'}}>{suffix}</span>}
      </div>
      {error&&<div className="error-msg">⚠ {error}</div>}
    </div>
  );
}

/* ── App ────────────────────────────────────── */
function App(){
  const [comp,setComp]=useState(300);
  const [larg,setLarg]=useState(200);
  const [alt,setAlt]=useState(150);
  const [qtd,setQtd]=useState(100);
  const [cliente,setCliente]=useState('');
  const [pedido,setPedido]=useState('');
  const [onda,setOnda]=useState('duplex');
  const [matIdx,setMatIdx]=useState(0);
  const [materiais,setMateriais]=useState(DEFAULT_MATERIAIS);
  const [desc,setDesc]=useState('Caixa de Papelão Ondulado Estruturada no Formato Maleta Normal RSC. Ideal para empacotamento, envios logísticos estáveis e armazenamento seguro.');
  const [showPrecos,setShowPrecos]=useState(false);
  const [touched,setTouched]=useState({});

  // Drag & Zoom
  const [zoom,setZoom]=useState(1.0);
  const [pos,setPos]=useState({x:0,y:0});
  const dragging=useRef(false);
  const dragOrigin=useRef({x:0,y:0});
  const posRef=useRef({x:0,y:0});

  useEffect(()=>{ posRef.current=pos; },[pos]);
  useEffect(()=>{ setMatIdx(0); },[onda]);

  const mat = materiais[onda][matIdx] ?? materiais[onda][0];
  const erros = validar(comp,larg,alt,qtd);
  const hasErrors = Object.keys(erros).length>0;
  const mark = (f) => setTouched(t=>({...t,[f]:true}));
  const markAll = () => setTouched({comp:true,larg:true,alt:true,qtd:true});

  const calc = useMemo(()=>{
    const c=Math.max(Number(comp)||0,0), l=Math.max(Number(larg)||0,0);
    const a=Math.max(Number(alt)||0,0), q=Math.max(Number(qtd)||0,0);
    if(!c||!l||!a||!q) return null;
    const {gramatura,custo:pc,venda:pv}=mat;
    const cV=c+4, lV=l+4;
    const devH=(2*cV)+(2*lV)+30;
    const devV=a+(lV/2)+(cV/2);
    const areaMm2=devH*devV;
    const pesoKg=(areaMm2/1_000_000)*gramatura/1000;
    const cu=pesoKg*pc, vu=pesoKg*pv, lu=vu-cu;
    return {
      areaMm2, pesoGramas:pesoKg*1000, pesoTotalKg:pesoKg*q,
      custoTotal:cu*q, vendaTotal:vu*q, lucroTotal:lu*q,
      margem: vu>0?(lu/vu)*100:0
    };
  },[comp,larg,alt,qtd,mat]);

  // Drag handlers
  const startDrag = useCallback((e)=>{
    dragging.current=true;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    dragOrigin.current={x:cx-posRef.current.x, y:cy-posRef.current.y};
  },[]);

  const onDrag = useCallback((e)=>{
    if(!dragging.current) return;
    if(e.preventDefault) e.preventDefault();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    setPos({x:cx-dragOrigin.current.x, y:cy-dragOrigin.current.y});
  },[]);

  const stopDrag = useCallback(()=>{ dragging.current=false; },[]);

  const margemColor = calc ? (calc.margem>30?'#4dcc7a':calc.margem>15?'#f5d800':'#ff7a5a') : '#f5d800';

  const exportPDF = () => {
    if(hasErrors){ markAll(); return; }
    const el = document.getElementById('pdf-template');
    el.style.display='block';
    const opt={
      margin:[10,10,10,10],
      filename:`Orcamento_YD_BOX_${comp}x${larg}x${alt}.pdf`,
      image:{type:'png',quality:1},
      html2canvas:{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    };
    html2pdf().set(opt).from(el).save().then(()=>{ el.style.display='none'; });
  };

  return (
    <div className="container">

      {showPrecos && <PrecosModal materiais={materiais} onSave={setMateriais} onClose={()=>setShowPrecos(false)}/>}

      {/* HEADER */}
      <div className="header">
        <div>
          <div className="logo">YD <span>BOX</span></div>
          <div className="subtitle">CALCULADORA DE PAPELÃO ONDULADO</div>
        </div>
        <div className="header-actions">
          <span className="header-date">{today}</span>
          <button className="btn" onClick={()=>setShowPrecos(true)}>⚙ Editar Preços</button>
        </div>
      </div>

      <div className="grid">

        {/* ── COLUNA ESQUERDA ── */}
        <div>

          {/* Identificação */}
          <div className="card">
            <div className="section-title">IDENTIFICAÇÃO DO PEDIDO</div>
            <div className="fields-2">
              <div>
                <div className="label">CLIENTE</div>
                <input type="text" value={cliente} onChange={e=>setCliente(e.target.value)} placeholder="Nome do cliente"/>
              </div>
              <div>
                <div className="label">Nº DO PEDIDO</div>
                <input type="text" value={pedido} onChange={e=>setPedido(e.target.value)} placeholder="Ex: PED-2026-001"/>
              </div>
            </div>
          </div>

          {/* Medidas */}
          <div className="card">
            <div className="section-title">MEDIDAS (EM MILÍMETROS)</div>
            <div className="fields-3">
              <Field label="COMPRIMENTO" value={comp} error={touched.comp&&erros.comp}
                onChange={v=>{setComp(v);mark('comp');}} onBlur={()=>mark('comp')}/>
              <Field label="LARGURA" value={larg} error={touched.larg&&erros.larg}
                onChange={v=>{setLarg(v);mark('larg');}} onBlur={()=>mark('larg')}/>
              <Field label="ALTURA" value={alt} error={touched.alt&&erros.alt}
                onChange={v=>{setAlt(v);mark('alt');}} onBlur={()=>mark('alt')}/>
            </div>
          </div>

          {/* Material */}
          <div className="card-highlight">
            <div className="section-title" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>ESTRUTURA DO MATERIAL</span>
              <span style={{fontSize:10,background:'#ccaa00',color:'#000',padding:'2px 8px',borderRadius:4,fontWeight:900}}>SELECIONE:</span>
            </div>
            <div className="fields-2">
              <div>
                <div className="label">TIPO DE ONDA</div>
                <select value={onda} onChange={e=>setOnda(e.target.value)}
                  style={{background:'#1a1a12',borderColor:'#f5d800'}}>
                  <option value="duplex">Duplex (Uma onda)</option>
                  <option value="triplex">Triplex (Duas ondas)</option>
                </select>
              </div>
              <div>
                <div className="label">ESPECIFICAÇÃO</div>
                <select value={matIdx} onChange={e=>setMatIdx(Number(e.target.value))}
                  style={{background:'#1a1a12',borderColor:'#f5d800'}}>
                  {materiais[onda].map((item,idx)=>(
                    <option key={idx} value={idx}>{item.label}</option>
                  ))}
                </select>
              </div>
            </div>
            <div className="mat-info">
              {[['Gramatura',mat.gramatura+'g'],[`Custo/kg`,money(mat.custo)],['Venda/kg',money(mat.venda)]].map(([k,v])=>(
                <div className="mat-info-item" key={k}><span>{k}</span><strong>{v}</strong></div>
              ))}
            </div>
          </div>

          {/* Quantidade */}
          <div className="card">
            <div className="section-title">QUANTIDADE</div>
            <Field label="UNIDADES" value={qtd} suffix="un" error={touched.qtd&&erros.qtd}
              onChange={v=>{setQtd(v);mark('qtd');}} onBlur={()=>mark('qtd')}/>
          </div>

          {/* Cálculo */}
          <div className="card">
            <div className="section-title">CÁLCULO</div>
            {hasErrors && Object.keys(touched).length>0 ? (
              <div style={{color:'#ff5a5a',fontSize:14,textAlign:'center',padding:'18px 0'}}>
                ⚠ Corrija os campos destacados para ver os resultados.
              </div>
            ) : calc ? (
              <>
                <div className="result">
                  <span className="result-name">Estrutura Aplicada</span>
                  <span className="result-value" style={{textTransform:'uppercase'}}>{onda} ({mat.gramatura}g)</span>
                </div>
                <div className="result">
                  <span className="result-name">Área Total</span>
                  <span className="result-value">{fmt(calc.areaMm2,0)} mm²</span>
                </div>
                <div className="result">
                  <span className="result-name">Peso por Caixa</span>
                  <span className="result-value">{fmt(calc.pesoGramas)} g</span>
                </div>
                <div className="result">
                  <span className="result-name">Peso Total do Pedido</span>
                  <span className="result-value">{fmt(calc.pesoTotalKg)} kg</span>
                </div>
                <div className="result">
                  <span className="result-name">Margem de Lucro</span>
                  <span className="result-value" style={{color:margemColor}}>{fmt(calc.margem)}%</span>
                </div>
              </>
            ) : (
              <div className="empty-state">Preencha as medidas para calcular.</div>
            )}
          </div>

          {/* Totais */}
          <div className="total-box">
            <h2 style={{fontSize:26,fontWeight:900}}>TOTAL DO PEDIDO</h2>
            {calc ? (
              <div className="total-grid">
                <div className="total-item"><h3>CUSTO</h3><p style={{color:'#999'}}>{money(calc.custoTotal)}</p></div>
                <div className="total-item"><h3>VENDA</h3><p style={{color:'#f5d800'}}>{money(calc.vendaTotal)}</p></div>
                <div className="total-item"><h3>LUCRO</h3><p style={{color:'#4dcc7a'}}>{money(calc.lucroTotal)}</p></div>
              </div>
            ) : (
              <div style={{color:'#333',textAlign:'center',padding:'20px 0',fontSize:14}}>—</div>
            )}
          </div>

        </div>

        {/* ── COLUNA DIREITA ── */}
        <div className="mockup">
          <svg className="mockup-bg" viewBox="0 0 800 600" preserveAspectRatio="none">
            <line x1="-50" y1="100" x2="850" y2="400" stroke="#000" strokeWidth="5" opacity="0.4"/>
            <line x1="200" y1="-50" x2="600" y2="650" stroke="#000" strokeWidth="3" opacity="0.3"/>
            <line x1="0" y1="500" x2="800" y2="100" stroke="#fff" strokeWidth="1" strokeDasharray="5,5" opacity="0.07"/>
            <circle cx="400" cy="300" r="200" fill="none" stroke="#f5d800" strokeWidth="1" strokeDasharray="4,10" opacity="0.07"/>
            <line x1="50" y1="650" x2="850" y2="-50" stroke="#f5d800" strokeWidth="1.5" opacity="0.12"/>
          </svg>

          <div className="mockup-controls">
            <button className="btn" onClick={()=>setZoom(z=>Math.min(z+0.15,2.2))}>Zoom +</button>
            <button className="btn" onClick={()=>setZoom(z=>Math.max(z-0.15,0.4))}>Zoom −</button>
            <button className="btn" onClick={()=>{setZoom(1);setPos({x:0,y:0});}}>Reset</button>
            <button className="btn btn-yellow" onClick={exportPDF}>Exportar PDF</button>
          </div>

          <div className="mockup-canvas"
            onMouseDown={startDrag} onMouseMove={onDrag} onMouseUp={stopDrag} onMouseLeave={stopDrag}
            onTouchStart={startDrag} onTouchMove={onDrag} onTouchEnd={stopDrag}>
            <svg viewBox="0 0 900 700" style={{
              width:'100%', maxWidth:700, userSelect:'none',
              transform:`translate(${pos.x}px,${pos.y}px) scale(${zoom})`,
              transition:'transform 0.08s ease-out'
            }}>
              <BoxSVG
                w={Math.max(Number(comp)||1,1)}
                h={Math.max(Number(larg)||1,1)}
                d={Math.max(Number(alt)||1,1)}
              />
            </svg>
          </div>

          <div className="mockup-desc">
            <h4>ESPECIFICAÇÕES DO MODELO (EDITÁVEL)</h4>
            <textarea value={desc} onChange={e=>setDesc(e.target.value)}
              placeholder="Escreva aqui a descrição técnica ou observações comerciais da caixa..."/>
          </div>
        </div>

      </div>

      {/* RESUMO */}
      {calc && (
        <div className="summary-section">
          <div className="section-title">RESUMO DO ORÇAMENTO</div>
          <div className="summary-grid">
            {[
              ['Cliente', cliente||'—'],
              ['Pedido', pedido||'—'],
              ['Dimensões', `${comp} × ${larg} × ${alt} mm`],
              ['Quantidade', `${fmt(qtd,0)} un`],
              ['Material', `${onda} — ${mat.label}`],
              ['Peso total', `${fmt(calc.pesoTotalKg)} kg`],
              ['Custo total', money(calc.custoTotal)],
              ['Venda total', money(calc.vendaTotal)],
            ].map(([l,v])=>(
              <div className="summary-item" key={l}>
                <span>{l.toUpperCase()}</span>
                <strong>{v}</strong>
              </div>
            ))}
          </div>
          {desc && <div className="summary-desc">{desc}</div>}
        </div>
      )}

      <div className="footer">YD BOX © 2026 — Desenvolvido por Douglas Lima</div>

      {/* PDF TEMPLATE — fundo branco para renderização correta */}
      <div id="pdf-template" style={{
        background:'#ffffff', color:'#111', fontFamily:"'Barlow Condensed',sans-serif",
        padding:'20px', width:'190mm', margin:'0 auto', fontSize:'13px'
      }}>

        {/* Cabeçalho */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',
          borderBottom:'3px solid #f5d800',paddingBottom:'12px',marginBottom:'16px'}}>
          <div>
            <div style={{fontSize:'34px',fontWeight:'900',lineHeight:1,color:'#111'}}>
              YD <span style={{color:'#f5d800'}}>BOX</span>
            </div>
            <div style={{fontSize:'10px',color:'#999',letterSpacing:'3px',marginTop:'3px'}}>
              RELATÓRIO TÉCNICO DE ORÇAMENTO
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            {cliente && <div style={{fontSize:'15px',fontWeight:'900',color:'#111'}}>{cliente}</div>}
            {pedido  && <div style={{fontSize:'12px',color:'#b89000',fontWeight:'700'}}>{pedido}</div>}
            <div style={{fontSize:'11px',color:'#aaa',marginTop:'4px'}}>{today}</div>
          </div>
        </div>

        {calc && (
          <>
            {/* Layout duas colunas: dados + desenho */}
            <div style={{display:'flex',gap:'16px',marginBottom:'14px',alignItems:'flex-start'}}>

              {/* Coluna dados */}
              <div style={{flex:'1'}}>
                <div style={{background:'#f8f8f8',border:'1px solid #e0e0e0',borderRadius:'10px',padding:'14px',marginBottom:'12px'}}>
                  <div style={{fontSize:'10px',fontWeight:'900',letterSpacing:'2px',color:'#b89000',marginBottom:'10px',borderBottom:'1px solid #e8e8e8',paddingBottom:'6px'}}>
                    DIMENSÕES E MATERIAL
                  </div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                    <tbody>
                      {[
                        ['Comprimento', comp+' mm'],
                        ['Largura',     larg+' mm'],
                        ['Altura',      alt+' mm'],
                        ['Estrutura',   onda.toUpperCase()+' — '+mat.label],
                        ['Gramatura',   mat.gramatura+' g/m²'],
                        ['Quantidade',  fmt(qtd,0)+' unidades'],
                      ].map(([l,v])=>(
                        <tr key={l} style={{borderBottom:'1px solid #f0f0f0'}}>
                          <td style={{padding:'5px 0',color:'#888',width:'48%'}}>{l}</td>
                          <td style={{padding:'5px 0',fontWeight:'700',color:'#111',textAlign:'right'}}>{v}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div style={{background:'#f8f8f8',border:'1px solid #e0e0e0',borderRadius:'10px',padding:'14px'}}>
                  <div style={{fontSize:'10px',fontWeight:'900',letterSpacing:'2px',color:'#b89000',marginBottom:'10px',borderBottom:'1px solid #e8e8e8',paddingBottom:'6px'}}>
                    DADOS TÉCNICOS
                  </div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                    <tbody>
                      {[
                        ['Área de Desenvolvimento', fmt(calc.areaMm2,0)+' mm²'],
                        ['Peso por Caixa',          fmt(calc.pesoGramas)+' g'],
                        ['Peso Total do Lote',      fmt(calc.pesoTotalKg)+' kg'],
                        ['Margem de Lucro',         fmt(calc.margem)+'%'],
                      ].map(([l,v])=>(
                        <tr key={l} style={{borderBottom:'1px solid #f0f0f0'}}>
                          <td style={{padding:'5px 0',color:'#888',width:'60%'}}>{l}</td>
                          <td style={{padding:'5px 0',fontWeight:'700',color:'#111',textAlign:'right'}}>{v}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Coluna desenho 3D */}
              <div style={{width:'240px',flexShrink:0}}>
                <div style={{background:'#f0f0f0',border:'1px solid #ddd',borderRadius:'10px',padding:'10px'}}>
                  <div style={{fontSize:'10px',fontWeight:'900',letterSpacing:'2px',color:'#b89000',marginBottom:'8px',textAlign:'center'}}>
                    PERSPECTIVA 3D
                  </div>
                  <svg viewBox="0 0 900 700" style={{width:'100%',height:'auto',display:'block'}}>
                    <rect width="900" height="700" fill="#f0f0f0"/>
                    <BoxSVG
                      w={Math.max(Number(comp)||1,1)}
                      h={Math.max(Number(larg)||1,1)}
                      d={Math.max(Number(alt)||1,1)}
                    />
                  </svg>
                  <div style={{textAlign:'center',marginTop:'6px',fontSize:'11px',color:'#888',fontWeight:'700'}}>
                    {comp} × {larg} × {alt} mm
                  </div>
                </div>
              </div>
            </div>

            {/* Totais financeiros */}
            <div style={{display:'flex',gap:'10px',marginBottom:'12px'}}>
              {[
                ['CUSTO INDÚSTRIA', money(calc.custoTotal), '#555555'],
                ['VALOR DE VENDA',  money(calc.vendaTotal), '#b89000'],
                ['LUCRO ESTIMADO',  money(calc.lucroTotal), '#2a8a4a'],
              ].map(([l,v,c])=>(
                <div key={l} style={{flex:1,background:'#f8f8f8',border:'1px solid #e0e0e0',
                  borderTop:'3px solid '+c,borderRadius:'8px',padding:'12px',textAlign:'center'}}>
                  <div style={{fontSize:'9px',color:'#aaa',letterSpacing:'1px',marginBottom:'5px'}}>{l}</div>
                  <div style={{fontSize:'18px',fontWeight:'900',color:c}}>{v}</div>
                </div>
              ))}
            </div>

            {/* Descrição */}
            {desc && (
              <div style={{background:'#f8f8f8',border:'1px solid #e0e0e0',borderRadius:'8px',padding:'12px',marginBottom:'12px'}}>
                <div style={{fontSize:'10px',fontWeight:'900',letterSpacing:'2px',color:'#b89000',marginBottom:'6px'}}>DESCRIÇÃO COMERCIAL</div>
                <p style={{fontSize:'12px',color:'#555',lineHeight:'1.5',margin:0}}>{desc}</p>
              </div>
            )}
          </>
        )}

        {/* Rodapé */}
        <div style={{borderTop:'1px solid #e0e0e0',paddingTop:'10px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:'10px',color:'#bbb'}}>YD BOX © 2026 — Desenvolvido por Douglas Lima</span>
          <span style={{fontSize:'10px',color:'#bbb'}}>Emitido em {today}</span>
        </div>

      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
