<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000"/>
<title>YD BOX — Calculadora</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  color:white;
  font-family:'Barlow Condensed',sans-serif;
}

input{
  font-family:'Barlow Condensed',sans-serif;
}

input[type=number]::-webkit-inner-spin-button{
  opacity:.4;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.layout{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:24px;
}

@media(max-width:980px){
  .layout{
    grid-template-columns:1fr;
  }
}

.card{
  background:#0d0d0d;
  border:1px solid #1f1f1f;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
}

.title{
  font-size:12px;
  font-weight:800;
  letter-spacing:.18em;
  color:#f5d800;
  margin-bottom:14px;
}

.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  font-size:10px;
  letter-spacing:.12em;
  color:#777;
  font-weight:700;
}

.field input{
  background:#111;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:12px;
  color:white;
  font-size:20px;
  font-weight:700;
  outline:none;
}

.field input:focus{
  border-color:#f5d800;
}

.result{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-bottom:1px solid #1a1a1a;
}

.result:last-child{
  border:none;
}

.result span{
  color:#888;
  letter-spacing:.08em;
  font-size:11px;
}

.result strong{
  color:white;
  font-size:18px;
}

.total{
  margin-top:18px;
  background:#f5d800;
  border-radius:16px;
  padding:20px;
  color:black;
}

.total h2{
  font-size:38px;
  line-height:1;
}

.total p{
  margin-top:8px;
  font-weight:700;
}

.mockupCard{
  background:
  radial-gradient(circle at top,#202020,#0b0b0b 70%);
  border:1px solid #1f1f1f;
  border-radius:22px;
  min-height:760px;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.mockupScene{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.measureText{
  fill:#f5d800;
  font-size:15px;
  font-weight:800;
  letter-spacing:.1em;
}

.measureLine{
  stroke:#f5d800;
  stroke-width:2;
}

@keyframes flapLeft{
  0%{
    transform:rotateX(0deg);
  }
  50%{
    transform:rotateX(-58deg);
  }
  100%{
    transform:rotateX(0deg);
  }
}

@keyframes flapRight{
  0%{
    transform:rotateX(0deg);
  }
  50%{
    transform:rotateX(-48deg);
  }
  100%{
    transform:rotateX(0deg);
  }
}

.flap1{
  transform-origin:bottom;
  animation:flapLeft 2.8s ease-in-out infinite;
}

.flap2{
  transform-origin:bottom;
  animation:flapRight 2.8s ease-in-out infinite;
}

.header{
  margin-bottom:20px;
}

.header h1{
  font-size:42px;
  font-weight:900;
  letter-spacing:.08em;
}

.header h1 span{
  color:#f5d800;
}

.header p{
  color:#666;
  font-size:12px;
  letter-spacing:.2em;
  font-weight:700;
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useMemo}=React;

const fmt=(n,d=2)=>
n.toLocaleString("pt-BR",{
minimumFractionDigits:d,
maximumFractionDigits:d
});

const brl=n=>"R$ "+fmt(n);

function Field({label,value,onChange}){

return(
<div className="field">

<label>{label}</label>

<input
type="number"
value={value}
onChange={e=>onChange(Number(e.target.value))}
/>

</div>
);

}

function App(){

const [comp,setComp]=useState(30);
const [larg,setLarg]=useState(20);
const [alt,setAlt]=useState(15);

const [gram,setGram]=useState(380);
const [pv,setPv]=useState(14);
const [pc,setPc]=useState(8);

const [qtd,setQtd]=useState(100);

const calc=useMemo(()=>{

const c=Number(comp)||0;
const l=Number(larg)||0;
const a=Number(alt)||0;
const g=Number(gram)||0;

const area=((c*l)+(a*c)+(a*l))/10000;

const peso=(area*g)/1000;

const custo=peso*pc;
const venda=peso*pv;
const lucro=venda-custo;

return{
peso,
custo,
venda,
lucro,
custoTotal:custo*qtd,
vendaTotal:venda*qtd,
lucroTotal:lucro*qtd,
margem:(lucro/venda)*100
};

},[
comp,
larg,
alt,
gram,
pv,
pc,
qtd
]);

/* ESCALA */

const width=220+(comp*2.5);
const depth=120+(larg*2);
const height=140+(alt*2);

return(

<div className="container">

<div className="header">
<h1>YD <span>BOX</span></h1>
<p>CALCULADORA DE PAPELÃO</p>
</div>

<div className="layout">

<div>

<div className="card">

<div className="title">
MEDIDAS DA CAIXA
</div>

<div className="grid3">

<Field
label="COMPRIMENTO"
value={comp}
onChange={setComp}
/>

<Field
label="LARGURA"
value={larg}
onChange={setLarg}
/>

<Field
label="ALTURA"
value={alt}
onChange={setAlt}
/>

</div>

</div>

<div className="card">

<div className="title">
MATERIAL
</div>

<div className="grid3">

<Field
label="GRAMATURA"
value={gram}
onChange={setGram}
/>

<Field
label="VENDA R$/KG"
value={pv}
onChange={setPv}
/>

<Field
label="CUSTO R$/KG"
value={pc}
onChange={setPc}
/>

</div>

</div>

<div className="card">

<div className="title">
QUANTIDADE
</div>

<Field
label="UNIDADES"
value={qtd}
onChange={setQtd}
/>

</div>

<div className="card">

<div className="title">
RESULTADOS
</div>

<div className="result">
<span>PESO POR CAIXA</span>
<strong>{fmt(calc.peso,4)} kg</strong>
</div>

<div className="result">
<span>CUSTO UNITÁRIO</span>
<strong>{brl(calc.custo)}</strong>
</div>

<div className="result">
<span>VENDA UNITÁRIA</span>
<strong>{brl(calc.venda)}</strong>
</div>

<div className="result">
<span>LUCRO UNITÁRIO</span>
<strong>{brl(calc.lucro)}</strong>
</div>

<div className="result">
<span>MARGEM</span>
<strong>{fmt(calc.margem,1)}%</strong>
</div>

</div>

<div className="total">

<div style={{
fontWeight:800,
letterSpacing:'.1em'
}}>
TOTAL DO PEDIDO
</div>

<h2>{brl(calc.vendaTotal)}</h2>

<p>
Lucro total: {brl(calc.lucroTotal)}
</p>

</div>

</div>

<div className="mockupCard">

<div className="mockupScene">

<svg
width="760"
height="620"
viewBox="0 0 760 620"
>

{/* SOMBRA */}

<ellipse
cx="390"
cy="520"
rx="190"
ry="40"
fill="rgba(0,0,0,.45)"
/>

{/* TAMPA ESQUERDA */}

<g className="flap1">

<polygon
points={`
240,180
390,120
390,220
240,280
`}
fill="#d7a043"
stroke="#8a5a14"
strokeWidth="3"
/>

</g>

{/* TAMPA DIREITA */}

<g className="flap2">

<polygon
points={`
390,120
540,180
540,280
390,220
`}
fill="#e2b154"
stroke="#8a5a14"
strokeWidth="3"
/>

</g>

{/* LATERAL ESQUERDA */}

<polygon
points={`
240,280
390,220
390,430
240,490
`}
fill="#b77b2d"
stroke="#8a5a14"
strokeWidth="3"
/>

{/* LATERAL DIREITA */}

<polygon
points={`
390,220
540,280
540,490
390,430
`}
fill="#9f6722"
stroke="#8a5a14"
strokeWidth="3"
/>

{/* FRENTE */}

<polygon
points={`
240,280
390,340
540,280
390,220
`}
fill="#cf9538"
stroke="#8a5a14"
strokeWidth="3"
/>

{/* FUNDO */}

<polygon
points={`
240,280
390,340
390,550
240,490
`}
fill="#c28734"
stroke="#8a5a14"
strokeWidth="3"
/>

<polygon
points={`
390,340
540,280
540,490
390,550
`}
fill="#b37529"
stroke="#8a5a14"
strokeWidth="3"
/>

{/* MEDIDAS */}

<line
x1="220"
y1="525"
x2="560"
y2="525"
className="measureLine"
/>

<text
x="390"
y="550"
textAnchor="middle"
className="measureText"
>
COMPRIMENTO {comp}cm
</text>

<line
x1="575"
y1="250"
x2="575"
y2="500"
className="measureLine"
/>

<text
x="610"
y="380"
transform="rotate(90 610 380)"
className="measureText"
>
ALTURA {alt}cm
</text>

<line
x1="300"
y1="130"
x2="520"
y2="210"
className="measureLine"
/>

<text
x="470"
y="120"
className="measureText"
>
LARGURA {larg}cm
</text>

</svg>

</div>

</div>

</div>

</div>

);

}

ReactDOM
.createRoot(document.getElementById("root"))
.render(<App/>);

</script>

</body>
</html>
