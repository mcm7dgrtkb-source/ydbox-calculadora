<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>YD BOX — Calculadora</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  color:white;
  font-family:'Barlow Condensed',sans-serif;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  border-bottom:2px solid #f5d800;
  padding-bottom:20px;
  margin-bottom:30px;
}

.logo{
  font-size:48px;
  font-weight:900;
}

.logo span{
  color:#f5d800;
}

.subtitle{
  color:#666;
  letter-spacing:4px;
  font-size:13px;
}

.grid{
  display:grid;
  grid-template-columns:400px 1fr;
  gap:25px;
}

.card{
  background:#101010;
  border:1px solid #232323;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
}

.section-title{
  color:#f5d800;
  font-size:12px;
  letter-spacing:3px;
  margin-bottom:18px;
  font-weight:800;
}

.fields{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.input-group label{
  display:block;
  margin-bottom:6px;
  color:#777;
  font-size:12px;
}

input{
  width:100%;
  background:#181818;
  border:1px solid #2a2a2a;
  border-radius:10px;
  padding:14px;
  color:white;
  font-size:20px;
  font-family:'Barlow Condensed';
}

input:focus{
  outline:none;
  border-color:#f5d800;
}

.mockup{
  background:#101010;
  border:1px solid #232323;
  border-radius:22px;
  min-height:700px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:sticky;
  top:20px;
}

.scene{
  position:relative;
  width:500px;
  height:500px;
}

/* MEDIDAS */

.measure{
  position:absolute;
  color:#f5d800;
  font-weight:900;
  text-shadow:0 0 10px black;
  text-align:center;
}

.measure small{
  display:block;
  font-size:12px;
  color:#888;
}

.measure.c{
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
}

.measure.l{
  right:20px;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
}

.measure.a{
  left:20px;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
}

@media(max-width:900px){

.grid{
  grid-template-columns:1fr;
}

.mockup{
  min-height:500px;
  position:relative;
}

.scene{
  transform:scale(.75);
}

}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState}=React;

function App(){

const [comp,setComp]=useState(30);
const [larg,setLarg]=useState(20);
const [alt,setAlt]=useState(15);

/* ESCALA VISUAL */

const c = Math.max(comp * 5,120);
const l = Math.max(larg * 4,80);
const a = Math.max(alt * 5,80);

return(

<div className="container">

<div className="header">

<div className="logo">
YD <span>BOX</span>
</div>

<div className="subtitle">
CALCULADORA DE PAPELÃO
</div>

</div>

<div className="grid">

{/* ESQUERDA */}

<div>

<div className="card">

<div className="section-title">
MEDIDAS DA CAIXA
</div>

<div className="fields">

<div className="input-group">
<label>COMPRIMENTO</label>

<input
type="number"
value={comp}
onChange={(e)=>setComp(Number(e.target.value))}
/>
</div>

<div className="input-group">
<label>LARGURA</label>

<input
type="number"
value={larg}
onChange={(e)=>setLarg(Number(e.target.value))}
/>
</div>

<div className="input-group">
<label>ALTURA</label>

<input
type="number"
value={alt}
onChange={(e)=>setAlt(Number(e.target.value))}
/>
</div>

</div>

</div>

<div className="card">

<div className="section-title">
VISUAL INTELIGENTE
</div>

<p style={{
color:'#999',
fontSize:'22px',
lineHeight:'30px'
}}>
A caixa altera automaticamente conforme as medidas digitadas,
mantendo proporção real de comprimento, largura e altura.
</p>

</div>

</div>

{/* DIREITA */}

<div className="mockup">

<div className="scene">

{/* TOPO */}

<div
style={{
position:'absolute',
left:'120px',
top:'80px',
width:`${c}px`,
height:`${l}px`,
background:'#d89a47',
transform:'skew(-30deg)',
border:'2px solid #8b5c1c'
}}
></div>

{/* FRENTE */}

<div
style={{
position:'absolute',
left:'70px',
top:`${80+(l/2)}px`,
width:`${c}px`,
height:`${a}px`,
background:'#c8893d',
border:'2px solid #8b5c1c'
}}
></div>

{/* LATERAL */}

<div
style={{
position:'absolute',
left:`${70+c}px`,
top:`${80+(l/2)}px`,
width:`${l}px`,
height:`${a}px`,
background:'#b67831',
transform:'skewY(-30deg)',
transformOrigin:'top',
border:'2px solid #8b5c1c'
}}
></div>

{/* ABA ESQUERDA */}

<div
style={{
position:'absolute',
left:'95px',
top:'42px',
width:`${c/2}px`,
height:'42px',
background:'#e4aa57',
transform:'skew(-30deg)',
border:'2px solid #8b5c1c'
}}
></div>

{/* ABA DIREITA */}

<div
style={{
position:'absolute',
left:`${95+(c/2)}px`,
top:'42px',
width:`${c/2}px`,
height:'42px',
background:'#e4aa57',
transform:'skew(-30deg)',
border:'2px solid #8b5c1c'
}}
></div>

{/* MEDIDAS */}

<div className="measure c">
{comp} cm
<small>Comprimento</small>
</div>

<div className="measure l">
{larg} cm
<small>Largura</small>
</div>

<div className="measure a">
{alt} cm
<small>Altura</small>
</div>

</div>

</div>

</div>

</div>

);

}

ReactDOM
.createRoot(document.getElementById('root'))
.render(<App/>);

</script>

</body>
</html>
