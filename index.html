<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000"/>
<title>YD BOX — Calculadora</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  color:white;
  font-family:'Barlow Condensed',sans-serif;
}

input{
  font-family:'Barlow Condensed',sans-serif;
}

input[type=number]::-webkit-inner-spin-button{
  opacity:0.3;
  filter:invert(1);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.fadeUp{
  animation:fadeUp .4s ease;
}

/* MOCKUP */

.mockup-wrap{
  width:100%;
  display:flex;
  justify-content:center;
  margin-bottom:26px;
  perspective:1200px;
}

.mockup-box{
  position:relative;
  transform-style:preserve-3d;
  transition:0.4s ease;
}

.box-top{
  position:absolute;
  left:0;
  top:0;
  background:#facc15;
  transform-origin:bottom;
  animation:openTop 3s ease-in-out infinite;
  border:2px solid #f5d800;
}

.box-front{
  position:absolute;
  left:0;
  background:#d4a017;
  border:2px solid #f5d800;
}

.box-side{
  position:absolute;
  top:0;
  background:#b8860b;
  border:2px solid #f5d800;
}

.measure{
  position:absolute;
  font-size:11px;
  font-weight:800;
  color:#f5d800;
  letter-spacing:0.12em;
}

.line{
  position:absolute;
  background:#f5d800;
}

@keyframes openTop{
  0%{
    transform:rotateX(0deg);
  }
  50%{
    transform:rotateX(-65deg);
  }
  100%{
    transform:rotateX(0deg);
  }
}

</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const { useState, useMemo } = React;

const fmt = (n,d=2)=>
  n.toLocaleString("pt-BR",{
    minimumFractionDigits:d,
    maximumFractionDigits:d
  });

const fmtBRL = (n)=>"R$ "+fmt(n,2);

function Field({
  label,
  value,
  onChange,
  unit,
  step="any",
  min=0
}){

  return(
    <div style={{
      display:"flex",
      flexDirection:"column",
      gap:6
    }}>

      <label style={{
        fontSize:10,
        letterSpacing:"0.15em",
        color:"#777",
        fontWeight:800,
        textTransform:"uppercase"
      }}>
        {label}
      </label>

      <div style={{
        display:"flex",
        alignItems:"center",
        background:"#111",
        border:"1px solid #333",
        borderRadius:8,
        overflow:"hidden"
      }}>

        <input
          type="number"
          min={min}
          step={step}
          value={value}
          onChange={(e)=>onChange(Number(e.target.value))}
          style={{
            flex:1,
            background:"transparent",
            border:"none",
            outline:"none",
            color:"white",
            padding:"12px",
            fontSize:20,
            fontWeight:700
          }}
        />

        <span style={{
          padding:"0 12px",
          color:"#666",
          fontSize:11,
          fontWeight:700
        }}>
          {unit}
        </span>

      </div>

    </div>
  );

}

function CalcRow({label,result,last}){

  return(
    <div style={{
      display:"flex",
      justifyContent:"space-between",
      padding:"12px 0",
      borderBottom:last?"none":"1px solid #1a1a1a"
    }}>

      <span style={{
        color:"#777",
        fontSize:12,
        letterSpacing:"0.1em",
        textTransform:"uppercase",
        fontWeight:700
      }}>
        {label}
      </span>

      <span style={{
        fontSize:18,
        fontWeight:800,
        color:"#fff"
      }}>
        {result}
      </span>

    </div>
  );

}

function App(){

  const [comp,setComp]=useState(30);
  const [larg,setLarg]=useState(20);
  const [alt,setAlt]=useState(15);

  const [gram,setGram]=useState(380);

  const [precoVenda,setPrecoVenda]=useState(14);
  const [precoCusto,setPrecoCusto]=useState(8);

  const [qtd,setQtd]=useState(100);

  const calc = useMemo(()=>{

    const c=Number(comp)||0;
    const l=Number(larg)||0;
    const a=Number(alt)||0;

    const g=Number(gram)||0;

    const pv=Number(precoVenda)||0;
    const pc=Number(precoCusto)||0;

    const q=Number(qtd)||0;

    if(!c||!l||!a)return null;

    const area=((c*l*a)/10000);

    const peso=(area*g)/1000;

    const custo=peso*pc;
    const venda=peso*pv;
    const lucro=venda-custo;

    return{
      custo,
      venda,
      lucro,
      custoTotal:custo*q,
      vendaTotal:venda*q,
      lucroTotal:lucro*q,
      margem:(lucro/venda)*100
    };

  },[
    comp,
    larg,
    alt,
    gram,
    precoVenda,
    precoCusto,
    qtd
  ]);

  /* TAMANHO VISUAL */

  const visualWidth = 120 + (comp*2);
  const visualHeight = 80 + (alt*2);
  const visualDepth = 60 + (larg*1.5);

  return(

    <div style={{
      minHeight:"100vh",
      paddingBottom:60
    }}>

      {/* HEADER */}

      <div style={{
        background:"#000",
        borderBottom:"3px solid #f5d800",
        padding:"18px 20px",
        position:"sticky",
        top:0,
        zIndex:20
      }}>

        <div style={{
          fontSize:34,
          fontWeight:900,
          letterSpacing:"0.08em"
        }}>
          YD <span style={{color:"#f5d800"}}>BOX</span>
        </div>

        <div style={{
          color:"#555",
          letterSpacing:"0.2em",
          fontSize:11,
          fontWeight:700
        }}>
          CALCULADORA DE PAPELÃO
        </div>

      </div>

      <div style={{
        maxWidth:700,
        margin:"0 auto",
        padding:"22px 16px"
      }}>

        {/* MOCKUP */}

        <div className="mockup-wrap fadeUp">

          <div
            className="mockup-box"
            style={{
              width:visualWidth,
              height:visualHeight
            }}
          >

            {/* TAMPA */}

            <div
              className="box-top"
              style={{
                width:visualWidth,
                height:visualDepth/2,
                transform:`translateY(-${visualDepth/2}px) skewX(-45deg)`
              }}
            />

            {/* FRENTE */}

            <div
              className="box-front"
              style={{
                width:visualWidth,
                height:visualHeight,
                top:0
              }}
            />

            {/* LATERAL */}

            <div
              className="box-side"
              style={{
                width:visualDepth,
                height:visualHeight,
                right:-visualDepth,
                transform:"skewY(-45deg)",
                transformOrigin:"left"
              }}
            />

            {/* MEDIDAS */}

            <div
              className="measure"
              style={{
                bottom:-28,
                left:"50%",
                transform:"translateX(-50%)"
              }}
            >
              COMPRIMENTO {comp}cm
            </div>

            <div
              className="line"
              style={{
                width:visualWidth,
                height:2,
                bottom:-10,
                left:0
              }}
            />

            <div
              className="measure"
              style={{
                right:-80,
                top:"50%",
                transform:"translateY(-50%) rotate(90deg)"
              }}
            >
              ALTURA {alt}cm
            </div>

            <div
              className="line"
              style={{
                width:2,
                height:visualHeight,
                right:-15,
                top:0
              }}
            />

            <div
              className="measure"
              style={{
                top:-50,
                right:-40
              }}
            >
              LARGURA {larg}cm
            </div>

          </div>

        </div>

        {/* CAMPOS */}

        <div style={{
          display:"grid",
          gridTemplateColumns:"1fr 1fr 1fr",
          gap:12,
          marginBottom:16
        }}>

          <Field
            label="Comprimento"
            value={comp}
            onChange={setComp}
            unit="cm"
          />

          <Field
            label="Largura"
            value={larg}
            onChange={setLarg}
            unit="cm"
          />

          <Field
            label="Altura"
            value={alt}
            onChange={setAlt}
            unit="cm"
          />

        </div>

        <div style={{
          display:"grid",
          gridTemplateColumns:"1fr 1fr 1fr",
          gap:12,
          marginBottom:16
        }}>

          <Field
            label="Gramatura"
            value={gram}
            onChange={setGram}
            unit="g/m²"
          />

          <Field
            label="Venda"
            value={precoVenda}
            onChange={setPrecoVenda}
            unit="R$/kg"
          />

          <Field
            label="Custo"
            value={precoCusto}
            onChange={setPrecoCusto}
            unit="R$/kg"
          />

        </div>

        <Field
          label="Quantidade"
          value={qtd}
          onChange={setQtd}
          unit="un"
          step="1"
        />

        {/* RESULTADOS */}

        {calc && (

          <div className="fadeUp">

            <div style={{
              marginTop:24,
              background:"#0d0d0d",
              border:"1px solid #222",
              borderRadius:12,
              padding:"0 18px"
            }}>

              <CalcRow
                label="Custo por caixa"
                result={fmtBRL(calc.custo)}
              />

              <CalcRow
                label="Venda por caixa"
                result={fmtBRL(calc.venda)}
              />

              <CalcRow
                label="Lucro por caixa"
                result={fmtBRL(calc.lucro)}
              />

              <CalcRow
                label="Custo Total"
                result={fmtBRL(calc.custoTotal)}
              />

              <CalcRow
                label="Venda Total"
                result={fmtBRL(calc.vendaTotal)}
              />

              <CalcRow
                label="Lucro Total"
                result={fmtBRL(calc.lucroTotal)}
              />

              <CalcRow
                label="Margem"
                result={fmt(calc.margem,1)+"%"}
                last
              />

            </div>

          </div>

        )}

      </div>

    </div>

  );

}

ReactDOM
.createRoot(document.getElementById("root"))
.render(<App/>);

</script>

</body>
</html>
