<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YD BOX — Calculadora</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#080808;
  font-family:'Barlow Condensed',sans-serif;
  color:white;
}

input{
  width:100%;
  background:#111;
  border:1px solid #2b2b2b;
  border-radius:10px;
  padding:14px;
  color:white;
  font-size:18px;
  font-family:'Barlow Condensed';
  outline:none;
}

input:focus{
  border-color:#f5d800;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:30px;
  border-bottom:2px solid #f5d800;
  padding-bottom:20px;
}

.logo{
  font-size:42px;
  font-weight:900;
}

.logo span{
  color:#f5d800;
}

.subtitle{
  color:#666;
  font-size:14px;
  letter-spacing:3px;
}

.grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:30px;
}

.card{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
}

.section-title{
  font-size:12px;
  letter-spacing:3px;
  color:#f5d800;
  margin-bottom:16px;
  font-weight:800;
}

.fields{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
}

.label{
  margin-bottom:6px;
  color:#777;
  font-size:12px;
}

.result{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #1f1f1f;
}

.result:last-child{
  border:none;
}

.result-name{
  color:#777;
}

.result-value{
  font-weight:800;
  color:#f5d800;
}

.total-box{
  background:#000;
  border:2px solid #f5d800;
  border-radius:18px;
  padding:20px;
}

.total-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:14px;
  margin-top:20px;
}

.total-item{
  background:#111;
  border-radius:12px;
  padding:18px;
  text-align:center;
}

.total-item h3{
  color:#666;
  font-size:12px;
  margin-bottom:8px;
}

.total-item p{
  font-size:22px;
  font-weight:900;
}

.mockup{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:18px;
  min-height:700px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

svg{
  width:100%;
  max-width:700px;
}

@media(max-width:900px){

.grid{
  grid-template-columns:1fr;
}

.mockup{
  min-height:450px;
}

}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

const {useState,useMemo}=React;

const fmt=(n,d=2)=>
n.toLocaleString('pt-BR',{
minimumFractionDigits:d,
maximumFractionDigits:d
});

const money=(n)=>"R$ "+fmt(n);

function App(){

const [comp,setComp]=useState(30);
const [larg,setLarg]=useState(20);
const [alt,setAlt]=useState(15);

const [gram,setGram]=useState(380);
const [venda,setVenda]=useState(14);
const [custo,setCusto]=useState(8);

const [qtd,setQtd]=useState(100);

const calc=useMemo(()=>{

const c=Number(comp)||0;
const l=Number(larg)||0;
const a=Number(alt)||0;

const g=Number(gram)||0;
const pv=Number(venda)||0;
const pc=Number(custo)||0;
const q=Number(qtd)||0;

const cVar=c+0.4;
const lVar=l+0.4;

const devHoriz=(2*cVar)+(2*lVar)+3;

const abaTop=lVar/2;
const abaBot=cVar/2;

const devVert=a+abaTop+abaBot;

const areaCm2=devHoriz*devVert;
const areaM2=areaCm2/10000;

const pesoGramas=areaM2*g;
const pesoKg=pesoGramas/1000;

const custoUnit=pesoKg*pc;
const vendaUnit=pesoKg*pv;
const lucroUnit=vendaUnit-custoUnit;

return{
devHoriz,
devVert,
areaCm2,
pesoKg,
pesoGramas,
custoTotal:custoUnit*q,
vendaTotal:vendaUnit*q,
lucroTotal:lucroUnit*q,
margem:(lucroUnit/vendaUnit)*100
};

},[comp,larg,alt,gram,venda,custo,qtd]);

/* ESCALA PROPORCIONAL */

const largura = Math.max(comp * 6,180);
const profundidade = Math.max(larg * 4,100);
const altura = Math.max(alt * 5,120);

/* ABAS METADE DA LARGURA */

const aba = largura / 2;

return(

<div className="container">

<div className="header">

<div>
<div className="logo">
YD <span>BOX</span>
</div>

<div className="subtitle">
CALCULADORA DE PAPELÃO
</div>
</div>

</div>

<div className="grid">

{/* ESQUERDA */}

<div>

<div className="card">

<div className="section-title">
MEDIDAS
</div>

<div className="fields">

<div>
<div className="label">COMPRIMENTO</div>

<input
type="number"
value={comp}
onChange={(e)=>setComp(e.target.value)}
/>
</div>

<div>
<div className="label">LARGURA</div>

<input
type="number"
value={larg}
onChange={(e)=>setLarg(e.target.value)}
/>
</div>

<div>
<div className="label">ALTURA</div>

<input
type="number"
value={alt}
onChange={(e)=>setAlt(e.target.value)}
/>
</div>

</div>

</div>

<div className="card">

<div className="section-title">
MATERIAL
</div>

<div className="fields">

<div>
<div className="label">GRAMATURA</div>

<input
type="number"
value={gram}
onChange={(e)=>setGram(e.target.value)}
/>
</div>

<div>
<div className="label">VENDA R$/KG</div>

<input
type="number"
value={venda}
onChange={(e)=>setVenda(e.target.value)}
/>
</div>

<div>
<div className="label">CUSTO R$/KG</div>

<input
type="number"
value={custo}
onChange={(e)=>setCusto(e.target.value)}
/>
</div>

</div>

</div>

<div className="card">

<div className="section-title">
QUANTIDADE
</div>

<input
type="number"
value={qtd}
onChange={(e)=>setQtd(e.target.value)}
/>

</div>

<div className="card">

<div className="section-title">
CÁLCULO
</div>

<div className="result">
<div className="result-name">Área Total</div>
<div className="result-value">{fmt(calc.areaCm2)} cm²</div>
</div>

<div className="result">
<div className="result-name">Peso por Caixa</div>
<div className="result-value">{fmt(calc.pesoGramas)} g</div>
</div>

<div className="result">
<div className="result-name">Margem</div>
<div className="result-value">{fmt(calc.margem)}%</div>
</div>

</div>

<div className="total-box">

<h2 style={{fontSize:'28px'}}>
TOTAL DO PEDIDO
</h2>

<div className="total-grid">

<div className="total-item">
<h3>CUSTO</h3>
<p style={{color:'#999'}}>
{money(calc.custoTotal)}
</p>
</div>

<div className="total-item">
<h3>VENDA</h3>
<p style={{color:'#f5d800'}}>
{money(calc.vendaTotal)}
</p>
</div>

<div className="total-item">
<h3>LUCRO</h3>
<p style={{color:'#4dcc7a'}}>
{money(calc.lucroTotal)}
</p>
</div>

</div>

</div>

</div>

{/* DIREITA */}

<div className="mockup">

<svg
viewBox="0 0 900 700"
>

{/* TOPO */}

<polygon
points={`
220,180
${220+largura},180
${220+largura+profundidade},${180+profundidade}
${220+profundidade},${180+profundidade}
`}
fill="#d89a47"
stroke="#8b5c1c"
strokeWidth="4"
/>

{/* FRENTE */}

<polygon
points={`
220,180
${220+profundidade},${180+profundidade}
${220+profundidade},${180+profundidade+altura}
220,${180+altura}
`}
fill="#c8893d"
stroke="#8b5c1c"
strokeWidth="4"
/>

{/* LATERAL */}

<polygon
points={`
${220+profundidade},${180+profundidade}
${220+largura+profundidade},${180+profundidade}
${220+largura+profundidade},${180+profundidade+altura}
${220+profundidade},${180+profundidade+altura}
`}
fill="#b67831"
stroke="#8b5c1c"
strokeWidth="4"
/>

{/* ABA ESQUERDA */}

<polygon
points={`
220,180
${220+(aba/2)},120
${220+aba},180
${220+profundidade},${180+profundidade}
`}
fill="#e4aa57"
stroke="#8b5c1c"
strokeWidth="4"
/>

{/* ABA DIREITA */}

<polygon
points={`
${220+aba},180
${220+aba+(aba/2)},120
${220+largura},180
${220+largura+profundidade},${180+profundidade}
`}
fill="#e4aa57"
stroke="#8b5c1c"
strokeWidth="4"
/>

{/* LINHA CENTRAL */}

<line
x1={220+aba}
y1="180"
x2={220+aba+(profundidade/2)}
y2={180+profundidade}
stroke="#8b5c1c"
strokeWidth="3"
/>

{/* MEDIDAS */}

<text
x={220+(largura/2)}
y={600}
fill="#f5d800"
fontSize="34"
fontWeight="900"
textAnchor="middle"
>
{comp} cm
</text>

<text
x={220+largura+profundidade+40}
y={280+(altura/2)}
fill="#f5d800"
fontSize="34"
fontWeight="900"
>
{larg} cm
</text>

<text
x="120"
y={280+(altura/2)}
fill="#f5d800"
fontSize="34"
fontWeight="900"
>
{alt} cm
</text>

</svg>

</div>

</div>

</div>

);

}

ReactDOM
.createRoot(document.getElementById('root'))
.render(<App/>);

</script>

</body>
</html>
